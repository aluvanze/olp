<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 LMS - Learning Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Grade 10 LMS</h1>
                    <p>Learning Management System</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentUser = null;
        let authToken = null;

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                authToken = token;
                checkAuth();
            }
        });

        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                if (response.ok) {
                    currentUser = await response.json();
                    showDashboard();
                } else {
                    localStorage.removeItem('authToken');
                    authToken = null;
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    errorDiv.textContent = '';
                    showDashboard();
                } else {
                    errorDiv.textContent = data.message || 'Login failed';
                    console.error('Login error:', data);
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please check if the server is running.';
                console.error('Login error:', error);
                console.error('Error details:', error.message);
            }
        });

        function showDashboard() {
            const root = document.getElementById('root');
            const role = currentUser.role;
            
            // Role-specific navigation
            let navButtons = '';
            
            if (role === 'student') {
                navButtons = `
                    <button onclick="loadView('courses')" class="nav-btn">My Courses</button>
                    <button onclick="loadView('assignments')" class="nav-btn">Assignments</button>
                    <button onclick="loadView('grades')" class="nav-btn">My Grades</button>
                    <button onclick="loadView('attendance')" class="nav-btn">Attendance</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'teacher') {
                navButtons = `
                    <button onclick="loadView('my-courses')" class="nav-btn">My Classes</button>
                    <button onclick="loadView('create-course')" class="nav-btn">Create Course</button>
                    <button onclick="loadView('pending-enrollments')" class="nav-btn">Pending Enrollments</button>
                    <button onclick="loadView('attendance')" class="nav-btn">Mark Attendance</button>
                    <button onclick="loadView('grading-center')" class="nav-btn">Grading Center</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'headteacher' || role === 'deputy_headteacher') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn">Dashboard</button>
                    <button onclick="loadView('teachers-overview')" class="nav-btn">Teachers Overview</button>
                    <button onclick="loadView('add-teacher')" class="nav-btn">Add Teacher</button>
                    <button onclick="loadView('allocate-courses')" class="nav-btn">Allocate Courses</button>
                    <button onclick="loadView('all-courses')" class="nav-btn">All Courses</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'superadmin') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn">System Dashboard</button>
                    <button onclick="loadView('users')" class="nav-btn">User Management</button>
                    <button onclick="loadView('teachers-overview')" class="nav-btn">Teachers Overview</button>
                    <button onclick="loadView('add-teacher')" class="nav-btn">Add Teacher</button>
                    <button onclick="loadView('allocate-courses')" class="nav-btn">Allocate Courses</button>
                    <button onclick="loadView('all-courses')" class="nav-btn">All Courses</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'parent') {
                navButtons = `
                    <button onclick="loadView('children')" class="nav-btn">My Children</button>
                    <button onclick="loadView('grades')" class="nav-btn">Grades</button>
                    <button onclick="loadView('attendance')" class="nav-btn">Attendance</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else {
                navButtons = `
                    <button onclick="loadView('courses')" class="nav-btn">Courses</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            }
            
            root.innerHTML = `
                <div class="dashboard">
                    <header class="dashboard-header">
                        <div class="header-content">
                            <h1>Grade 10 LMS</h1>
                            <div class="user-menu">
                                <span>Welcome, ${currentUser.first_name} ${currentUser.last_name}</span>
                                <span class="role-badge role-${role}">${role.replace('_', ' ')}</span>
                                <button onclick="logout()" class="btn-logout">Logout</button>
                            </div>
                        </div>
                    </header>
                    <nav class="dashboard-nav">
                        ${navButtons}
                    </nav>
                    <main class="dashboard-content" id="dashboardContent">
                        <div class="welcome-message">
                            <h2>Welcome, ${currentUser.first_name}!</h2>
                            <p>Select an option from the navigation menu to get started.</p>
                        </div>
                    </main>
                </div>
            `;
        }

        async function loadView(viewName) {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                switch(viewName) {
                    // Student views
                    case 'courses':
                        await loadCourses();
                        break;
                    case 'modules':
                        await loadModules();
                        break;
                    case 'assignments':
                        await loadAssignments();
                        break;
                    case 'grades':
                        await loadGrades();
                        break;
                    case 'attendance':
                        await loadAttendance();
                        break;
                    case 'messages':
                        await loadMessages();
                        break;
                    
                    // Teacher views
                    case 'my-courses':
                        await loadTeacherCourses();
                        break;
                    case 'create-course':
                        await showCreateCourse();
                        break;
                    case 'pending-enrollments':
                        await loadPendingEnrollments();
                        break;
                    case 'grading-center':
                        await loadGradingCenter();
                        break;
                    
                    // Admin views
                    case 'dashboard':
                        await loadAdminDashboard();
                        break;
                    case 'teachers-overview':
                        await loadTeachersOverview();
                        break;
                    case 'add-teacher':
                        await showAddTeacher();
                        break;
                    case 'allocate-courses':
                        await showAllocateCourses();
                        break;
                    case 'all-courses':
                        await loadAllCourses();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    
                    // Parent views
                    case 'children':
                        await loadChildren();
                        break;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Error loading ${viewName}: ${error.message}</div>`;
                console.error('Load view error:', error);
            }
        }

        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'API error');
            }
            return response.json();
        }

        async function loadCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Courses</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p>${course.description || ''}</p>
                            <p><strong>Teacher:</strong> ${course.teacher_first_name || ''} ${course.teacher_last_name || ''}</p>
                            <p><strong>Enrolled Students:</strong> ${course.enrolled_students || 0}</p>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Course</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewCourse(courseId) {
            const course = await apiCall(`/courses/${courseId}`);
            const modules = await apiCall(`/modules/course/${courseId}`);
            const assignments = await apiCall(`/assignments/course/${courseId}`);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('courses')" class="btn-back">← Back to Courses</button>
                    <h2>${course.course_name}</h2>
                </div>
                <div class="course-details">
                    <div class="section">
                        <h3>Learning Modules</h3>
                        <div class="modules-list">
                            ${modules.map(module => `
                                <div class="module-card">
                                    <h4>${module.module_name}</h4>
                                    <p>${module.module_description || ''}</p>
                                    <button onclick="viewModule(${module.id})" class="btn-view">View Module</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="section">
                        <h3>Assignments</h3>
                        <div class="assignments-list">
                            ${assignments.map(assignment => `
                                <div class="assignment-card">
                                    <h4>${assignment.title}</h4>
                                    <p><strong>Type:</strong> ${assignment.assignment_type}</p>
                                    <p><strong>Points:</strong> ${assignment.total_points}</p>
                                    <p><strong>Due:</strong> ${assignment.due_date ? new Date(assignment.due_date).toLocaleDateString() : 'No due date'}</p>
                                    <button onclick="viewAssignment(${assignment.id})" class="btn-view">View Assignment</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        async function viewModule(moduleId) {
            const module = await apiCall(`/modules/${moduleId}`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('modules')" class="btn-back">← Back</button>
                    <h2>${module.module_name}</h2>
                </div>
                <div class="module-content">
                    <p>${module.module_description || ''}</p>
                    <h3>Content</h3>
                    <div class="content-list">
                        ${module.content.map(item => `
                            <div class="content-item">
                                <h4>${item.title}</h4>
                                ${item.content_text ? `<p>${item.content_text}</p>` : ''}
                                ${item.content_url ? `<a href="${item.content_url}" target="_blank" class="btn-download">View/Download</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        async function viewAssignment(assignmentId) {
            const assignment = await apiCall(`/assignments/${assignmentId}`);
            let submission = null;
            try {
                submission = await apiCall(`/assignments/${assignmentId}/submission`);
            } catch (e) {
                // No submission yet
            }
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('assignments')" class="btn-back">← Back</button>
                    <h2>${assignment.title}</h2>
                </div>
                <div class="assignment-details">
                    <p><strong>Description:</strong></p>
                    <p>${assignment.description || ''}</p>
                    <p><strong>Points:</strong> ${assignment.total_points}</p>
                    <p><strong>Due Date:</strong> ${assignment.due_date ? new Date(assignment.due_date).toLocaleString() : 'No due date'}</p>
                    ${assignment.instructions ? `<p><strong>Instructions:</strong><br>${assignment.instructions}</p>` : ''}
                    ${currentUser.role === 'student' ? `
                        <div class="submission-section">
                            <h3>Your Submission</h3>
                            ${submission ? `
                                <p><strong>Submitted:</strong> ${new Date(submission.submitted_at).toLocaleString()}</p>
                                ${submission.submission_text ? `<p>${submission.submission_text}</p>` : ''}
                                <p>Status: ${submission.status}</p>
                            ` : `
                                <form id="submitForm" onsubmit="submitAssignment(event, ${assignmentId})">
                                    <textarea name="submission_text" placeholder="Enter your submission text" rows="10"></textarea>
                                    <input type="file" name="files" multiple>
                                    <button type="submit" class="btn-primary">Submit Assignment</button>
                                </form>
                            `}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        async function submitAssignment(e, assignmentId) {
            e.preventDefault();
            // Simplified - would need FormData for file uploads
            alert('File upload submission requires FormData. This is a simplified demo.');
        }

        async function loadModules() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Learning Modules</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Modules</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadAssignments() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Assignments</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Assignments</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadGrades() {
            const courses = await apiCall('/courses');
            let allGrades = [];
            
            for (const course of courses) {
                try {
                    const grades = await apiCall(`/grades/course/${course.id}`);
                    allGrades = allGrades.concat(grades.map(g => ({...g, course_name: course.course_name})));
                } catch (e) {
                    // Skip if no grades
                }
            }
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Grades</h2>
                </div>
                <div class="grades-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Course</th>
                                <th>Assignment</th>
                                <th>Points Earned</th>
                                <th>Points Possible</th>
                                <th>Percentage</th>
                                <th>Letter Grade</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${allGrades.map(grade => `
                                <tr>
                                    <td>${grade.course_name}</td>
                                    <td>${grade.assignment_title || grade.grade_type}</td>
                                    <td>${grade.points_earned}</td>
                                    <td>${grade.points_possible}</td>
                                    <td>${grade.percentage}%</td>
                                    <td>${grade.letter_grade}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadAttendance() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Attendance</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewAttendance(${course.id})" class="btn-view">View Attendance</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewAttendance(courseId) {
            const attendance = await apiCall(`/attendance/course/${courseId}`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('attendance')" class="btn-back">← Back</button>
                    <h2>Attendance Records</h2>
                </div>
                <div class="attendance-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${attendance.map(record => `
                                <tr>
                                    <td>${new Date(record.attendance_date).toLocaleDateString()}</td>
                                    <td>${record.status}</td>
                                    <td>${record.notes || ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadMessages() {
            const messages = await apiCall('/email/inbox');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Messages</h2>
                    <button onclick="showComposeMessage()" class="btn-primary">Compose</button>
                </div>
                <div class="messages-list">
                    ${messages.map(msg => `
                        <div class="message-card ${msg.is_read ? '' : 'unread'}">
                            <h4>${msg.subject}</h4>
                            <p><strong>From:</strong> ${msg.sender_first_name} ${msg.sender_last_name}</p>
                            <p>${msg.message_body.substring(0, 100)}...</p>
                            <button onclick="viewMessage(${msg.id})" class="btn-view">Read</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Teacher: Load my courses
        async function loadTeacherCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Classes</h2>
                    <button onclick="loadView('create-course')" class="btn-primary">Create New Course</button>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p>${course.description || ''}</p>
                            <p><strong>Students:</strong> ${course.enrolled_students || 0}</p>
                            <button onclick="viewCourse(${course.id})" class="btn-view">Manage Course</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Teacher: Show create course form
        async function showCreateCourse() {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('my-courses')" class="btn-back">← Back</button>
                    <h2>Create New Course</h2>
                </div>
                <div class="form-container">
                    <form id="createCourseForm" onsubmit="createCourse(event)">
                        <div class="form-group">
                            <label>Course Code *</label>
                            <input type="text" name="course_code" required placeholder="e.g., MATH10">
                        </div>
                        <div class="form-group">
                            <label>Course Name *</label>
                            <input type="text" name="course_name" required placeholder="e.g., Mathematics Grade 10">
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea name="description" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Academic Year *</label>
                            <input type="text" name="academic_year" required placeholder="e.g., 2024-2025">
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <input type="text" name="semester" placeholder="e.g., Fall 2024">
                        </div>
                        <button type="submit" class="btn-primary">Create Course</button>
                    </form>
                </div>
            `;
        }

        async function createCourse(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await apiCall('/courses', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                alert('Course created successfully!');
                loadView('my-courses');
            } catch (error) {
                alert('Error creating course: ' + error.message);
            }
        }

        // Teacher: Load pending enrollments
        async function loadPendingEnrollments() {
            const enrollments = await apiCall('/admin/enrollments/pending');
            const content = document.getElementById('dashboardContent');
            
            if (enrollments.length === 0) {
                content.innerHTML = `
                    <div class="view-header">
                        <h2>Pending Enrollments</h2>
                    </div>
                    <div class="welcome-message">
                        <p>No pending enrollment requests.</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="view-header">
                    <h2>Pending Enrollments (${enrollments.length})</h2>
                </div>
                <div class="enrollments-list">
                    ${enrollments.map(enrollment => `
                        <div class="enrollment-card">
                            <h4>${enrollment.first_name} ${enrollment.last_name}</h4>
                            <p><strong>Course:</strong> ${enrollment.course_name} (${enrollment.course_code})</p>
                            <p><strong>Requested:</strong> ${new Date(enrollment.created_at).toLocaleDateString()}</p>
                            <div class="action-buttons">
                                <button onclick="authorizeEnrollment(${enrollment.id}, 'approved')" class="btn-success">Approve</button>
                                <button onclick="authorizeEnrollment(${enrollment.id}, 'rejected')" class="btn-danger">Reject</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function authorizeEnrollment(enrollmentId, status) {
            if (!confirm(`Are you sure you want to ${status} this enrollment?`)) return;
            
            try {
                await apiCall(`/admin/enrollments/${enrollmentId}/authorize`, {
                    method: 'POST',
                    body: JSON.stringify({ status, notes: '' })
                });
                alert(`Enrollment ${status}!`);
                loadPendingEnrollments();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Teacher: Load grading center
        async function loadGradingCenter() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Grading Center</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewGradingCenter(${course.id})" class="btn-view">View Grades</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewGradingCenter(courseId) {
            const gradingData = await apiCall(`/grades/course/${courseId}/grading-center`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('grading-center')" class="btn-back">← Back</button>
                    <h2>Grading Center</h2>
                </div>
                <div class="grades-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Current Average</th>
                                <th>Final Grade</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${gradingData.map(student => `
                                <tr>
                                    <td>${student.first_name} ${student.last_name}</td>
                                    <td>${student.currentAverage}%</td>
                                    <td>${student.finalGrade ? student.finalGrade.letter_grade : 'N/A'}</td>
                                    <td>
                                        <button onclick="viewStudentGrades(${courseId}, ${student.id})" class="btn-view">View Details</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function viewStudentGrades(courseId, studentId) {
            const summary = await apiCall(`/grades/course/${courseId}/student/${studentId}/summary`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="viewGradingCenter(${courseId})" class="btn-back">← Back</button>
                    <h2>Student Grade Details</h2>
                </div>
                <div class="grades-table">
                    <p><strong>Current Average:</strong> ${summary.currentAverage}%</p>
                    <p><strong>Final Grade:</strong> ${summary.finalGrade ? summary.finalGrade.letter_grade : 'N/A'}</p>
                    <table>
                        <thead>
                            <tr>
                                <th>Assignment</th>
                                <th>Points Earned</th>
                                <th>Points Possible</th>
                                <th>Percentage</th>
                                <th>Grade</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${summary.grades.map(grade => `
                                <tr>
                                    <td>${grade.assignment_title || grade.grade_type}</td>
                                    <td>${grade.points_earned}</td>
                                    <td>${grade.points_possible}</td>
                                    <td>${grade.percentage}%</td>
                                    <td>${grade.letter_grade}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // Admin: Load dashboard
        async function loadAdminDashboard() {
            const stats = await apiCall('/admin/dashboard');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>System Dashboard</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Users</h3>
                        <p>Students: ${stats.users.student || 0}</p>
                        <p>Teachers: ${stats.users.teacher || 0}</p>
                        <p>Total: ${Object.values(stats.users).reduce((a, b) => a + b, 0)}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Courses</h3>
                        <p>Total: ${stats.courses.total_courses || 0}</p>
                        <p>Teachers: ${stats.courses.teachers_with_courses || 0}</p>
                        <p>Enrolled: ${stats.courses.enrolled_students || 0}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Assignments</h3>
                        <p>Total: ${stats.assignments.total_assignments || 0}</p>
                        <p>Courses: ${stats.assignments.courses_with_assignments || 0}</p>
                    </div>
                    <div class="stat-card">
                        <h3>Grades</h3>
                        <p>Total: ${stats.grades.total_grades || 0}</p>
                        <p>Students: ${stats.grades.students_graded || 0}</p>
                        <p>Average: ${parseFloat(stats.grades.average_percentage || 0).toFixed(1)}%</p>
                    </div>
                </div>
            `;
        }

        // Admin: Load teachers overview
        async function loadTeachersOverview() {
            const teachers = await apiCall('/admin/teachers/overview');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Teachers Overview</h2>
                </div>
                <div class="teachers-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Teacher</th>
                                <th>Courses</th>
                                <th>Students</th>
                                <th>Assignments</th>
                                <th>Grades Given</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${teachers.map(teacher => `
                                <tr>
                                    <td>${teacher.first_name} ${teacher.last_name}</td>
                                    <td>${teacher.total_courses || 0}</td>
                                    <td>${teacher.total_students || 0}</td>
                                    <td>${teacher.total_assignments || 0}</td>
                                    <td>${teacher.total_grades_given || 0}</td>
                                    <td>
                                        <button onclick="viewTeacherClasses(${teacher.id})" class="btn-view">View Classes</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function viewTeacherClasses(teacherId) {
            const classes = await apiCall(`/admin/teachers/${teacherId}/classes`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('teachers-overview')" class="btn-back">← Back</button>
                    <h2>Teacher Classes</h2>
                </div>
                <div class="courses-grid">
                    ${classes.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p>Students: ${course.enrolled_students || 0}</p>
                            <p>Assignments: ${course.assignment_count || 0}</p>
                            <p>Modules: ${course.module_count || 0}</p>
                            <p>Avg Grade: ${parseFloat(course.average_grade || 0).toFixed(1)}%</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Admin: Show add teacher form
        async function showAddTeacher() {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Add New Teacher</h2>
                </div>
                <div class="form-container">
                    <form id="addTeacherForm" onsubmit="addTeacher(event)">
                        <div class="form-group">
                            <label>Username *</label>
                            <input type="text" name="username" required>
                        </div>
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>Password *</label>
                            <input type="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" name="first_name" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" name="last_name" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="phone">
                        </div>
                        <button type="submit" class="btn-primary">Add Teacher</button>
                    </form>
                </div>
            `;
        }

        async function addTeacher(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await apiCall('/admin/teachers', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                alert('Teacher added successfully!');
                e.target.reset();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Admin: Show allocate courses
        async function showAllocateCourses() {
            const [courses, teachers] = await Promise.all([
                apiCall('/courses'),
                apiCall('/users?role=teacher')
            ]);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Allocate Courses to Teachers</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p>Current Teacher: ${course.teacher_first_name || 'None'} ${course.teacher_last_name || ''}</p>
                            <select id="teacher_${course.id}" class="form-select">
                                <option value="">Select Teacher</option>
                                ${teachers.map(t => `<option value="${t.id}" ${t.id === course.teacher_id ? 'selected' : ''}>${t.first_name} ${t.last_name}</option>`).join('')}
                            </select>
                            <button onclick="allocateCourse(${course.id})" class="btn-primary">Allocate</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function allocateCourse(courseId) {
            const teacherId = document.getElementById(`teacher_${courseId}`).value;
            if (!teacherId) {
                alert('Please select a teacher');
                return;
            }
            
            try {
                await apiCall('/admin/allocate-course', {
                    method: 'POST',
                    body: JSON.stringify({ teacher_id: parseInt(teacherId), course_id: courseId })
                });
                alert('Course allocated successfully!');
                showAllocateCourses();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Admin: Load all courses
        async function loadAllCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>All Courses</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p><strong>Teacher:</strong> ${course.teacher_first_name || ''} ${course.teacher_last_name || 'Unassigned'}</p>
                            <p><strong>Students:</strong> ${course.enrolled_students || 0}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Superadmin: Load users
        async function loadUsers() {
            const users = await apiCall('/admin/users');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>User Management</h2>
                </div>
                <div class="users-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${users.map(user => `
                                <tr>
                                    <td>${user.username}</td>
                                    <td>${user.first_name} ${user.last_name}</td>
                                    <td>${user.email}</td>
                                    <td>${user.role}</td>
                                    <td>${user.is_active ? 'Active' : 'Inactive'}</td>
                                    <td>
                                        <button onclick="toggleUserStatus(${user.id}, ${!user.is_active})" class="btn-small">
                                            ${user.is_active ? 'Deactivate' : 'Activate'}
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function toggleUserStatus(userId, isActive) {
            try {
                await apiCall(`/admin/users/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ is_active: isActive })
                });
                alert(`User ${isActive ? 'activated' : 'deactivated'}!`);
                loadUsers();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Parent: Load children
        async function loadChildren() {
            const children = await apiCall(`/users/parent/${currentUser.id}/students`);
            const content = document.getElementById('dashboardContent');
            
            if (children.length === 0) {
                content.innerHTML = `
                    <div class="view-header">
                        <h2>My Children</h2>
                    </div>
                    <div class="welcome-message">
                        <p>No children linked to your account.</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Children</h2>
                </div>
                <div class="children-list">
                    ${children.map(child => `
                        <div class="child-card">
                            <h3>${child.first_name} ${child.last_name}</h3>
                            <p>Email: ${child.email}</p>
                            <button onclick="viewChildProgress(${child.id})" class="btn-view">View Progress</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewChildProgress(studentId) {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('children')" class="btn-back">← Back</button>
                    <h2>Child's Progress</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewChildCourse(${course.id}, ${studentId})" class="btn-view">View Details</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewChildCourse(courseId, studentId) {
            const [grades, attendance] = await Promise.all([
                apiCall(`/grades/course/${courseId}/student/${studentId}/summary`),
                apiCall(`/attendance/course/${courseId}?student_id=${studentId}`)
            ]);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="viewChildProgress(${studentId})" class="btn-back">← Back</button>
                    <h2>Course Details</h2>
                </div>
                <div class="child-details">
                    <h3>Grades</h3>
                    <p>Current Average: ${grades.currentAverage}%</p>
                    <p>Final Grade: ${grades.finalGrade ? grades.finalGrade.letter_grade : 'N/A'}</p>
                    <h3>Attendance</h3>
                    <p>Total Records: ${attendance.length}</p>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('authToken');
            location.reload();
        }
    </script>
</body>
</html>
