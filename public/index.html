<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 10 LMS - Learning Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="root">
        <div class="login-container">
            <div class="login-box">
                <div class="login-header">
                    <h1>Grade 10 LMS</h1>
                    <p>Learning Management System</p>
                </div>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username or Email</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                    <div id="loginError" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentUser = null;
        let authToken = null;

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                authToken = token;
                checkAuth();
            }
        });

        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                if (response.ok) {
                    currentUser = await response.json();
                    showDashboard();
                } else {
                    localStorage.removeItem('authToken');
                    authToken = null;
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    errorDiv.textContent = '';
                    showDashboard();
                } else {
                    errorDiv.textContent = data.message || 'Login failed';
                    console.error('Login error:', data);
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please check if the server is running.';
                console.error('Login error:', error);
                console.error('Error details:', error.message);
            }
        });

        function showDashboard() {
            const root = document.getElementById('root');
            const role = currentUser.role;
            
            // Role-specific navigation
            let navButtons = '';
            
            if (role === 'student') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn">Dashboard</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'teacher') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn">Dashboard</button>
                    <button onclick="loadView('register-student')" class="nav-btn">Register Student</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'headteacher' || role === 'deputy_headteacher' || role === 'superadmin' || role === 'finance') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn">Dashboard</button>
                    <button onclick="loadView('register-student')" class="nav-btn">Register Student</button>
                    ${role === 'superadmin' || role === 'headteacher' ? `<button onclick="loadView('manage-terms')" class="nav-btn">Manage Terms</button>` : ''}
                    ${role === 'superadmin' ? `<button onclick="loadView('users')" class="nav-btn">User Management</button>` : ''}
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'parent') {
                navButtons = `
                    <button onclick="loadView('children')" class="nav-btn">My Children</button>
                    <button onclick="loadView('grades')" class="nav-btn">Grades</button>
                    <button onclick="loadView('attendance')" class="nav-btn">Attendance</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else {
                navButtons = `
                    <button onclick="loadView('courses')" class="nav-btn">Courses</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            }
            
            root.innerHTML = `
                <div class="dashboard">
                    <header class="dashboard-header">
                        <div class="header-content">
                            <h1>Grade 10 LMS</h1>
                            <div class="user-menu">
                                <span>Welcome, ${currentUser.first_name} ${currentUser.last_name}</span>
                                <span class="role-badge role-${role}">${role.replace('_', ' ')}</span>
                                <button onclick="logout()" class="btn-logout">Logout</button>
                            </div>
                        </div>
                    </header>
                    <nav class="dashboard-nav">
                        ${navButtons}
                    </nav>
                    <main class="dashboard-content" id="dashboardContent">
                        <div class="welcome-message">
                            <h2>Welcome, ${currentUser.first_name}!</h2>
                            <p>Select an option from the navigation menu to get started.</p>
                        </div>
                    </main>
                </div>
            `;
        }

        async function loadView(viewName) {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                switch(viewName) {
                    // Student views
                    case 'dashboard':
                        await loadDashboard();
                        break;
                    case 'term-courses':
                        await loadTermCourses();
                        break;
                    case 'courses':
                        await loadCourses();
                        break;
                    case 'modules':
                        await loadModules();
                        break;
                    case 'assignments':
                        await loadAssignments();
                        break;
                    case 'grades':
                        await loadGrades();
                        break;
                    case 'attendance':
                        await loadAttendance();
                        break;
                    case 'messages':
                        await loadMessages();
                        break;
                    
                    // Teacher views
                    case 'my-courses':
                        await loadTeacherCourses();
                        break;
                    case 'assign-teachers':
                        await showAssignTeachers();
                        break;
                    case 'pending-enrollments':
                        await loadPendingEnrollments();
                        break;
                    case 'grading-center':
                        await loadGradingCenter();
                        break;
                    
                    // Admin views
                    case 'dashboard':
                        await loadAdminDashboard();
                        break;
                    case 'term-courses':
                        await loadTermCourses();
                        break;
                    case 'teachers-overview':
                        await loadTeachersOverview();
                        break;
                    case 'add-teacher':
                        await showAddTeacher();
                        break;
                    case 'allocate-courses':
                        await showAllocateCourses();
                        break;
                    case 'all-courses':
                        await loadAllCourses();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    case 'manage-terms':
                        await loadManageTerms();
                        break;
                    case 'register-student':
                        await loadRegisterStudent();
                        break;
                    
                    // Parent views
                    case 'children':
                        await loadChildren();
                        break;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Error loading ${viewName}: ${error.message}</div>`;
                console.error('Load view error:', error);
            }
        }

        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.message || 'API error');
            }
            return response.json();
        }

        async function loadCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Courses</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p>${course.description || ''}</p>
                            <p><strong>Teacher:</strong> ${course.teacher_first_name || ''} ${course.teacher_last_name || ''}</p>
                            <p><strong>Enrolled Students:</strong> ${course.enrolled_students || 0}</p>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Course</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewCourse(courseId) {
            const course = await apiCall(`/courses/${courseId}`);
            const modules = await apiCall(`/modules/course/${courseId}`);
            const assignments = await apiCall(`/assignments/course/${courseId}`);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('courses')" class="btn-back">← Back to Courses</button>
                    <h2>${course.course_name}</h2>
                </div>
                <div class="course-details">
                    <div class="section">
                        <h3>Learning Modules</h3>
                        <div class="modules-list">
                            ${modules.map(module => `
                                <div class="module-card">
                                    <h4>${module.module_name}</h4>
                                    <p>${module.module_description || ''}</p>
                                    <button onclick="viewModule(${module.id})" class="btn-view">View Module</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="section">
                        <h3>Assignments</h3>
                        <div class="assignments-list">
                            ${assignments.map(assignment => `
                                <div class="assignment-card">
                                    <h4>${assignment.title}</h4>
                                    <p><strong>Type:</strong> ${assignment.assignment_type}</p>
                                    <p><strong>Points:</strong> ${assignment.total_points}</p>
                                    <p><strong>Due:</strong> ${assignment.due_date ? new Date(assignment.due_date).toLocaleDateString() : 'No due date'}</p>
                                    <button onclick="viewAssignment(${assignment.id})" class="btn-view">View Assignment</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        async function viewModule(moduleId) {
            const module = await apiCall(`/modules/${moduleId}`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('modules')" class="btn-back">← Back</button>
                    <h2>${module.module_name}</h2>
                </div>
                <div class="module-content">
                    <p>${module.module_description || ''}</p>
                    <h3>Content</h3>
                    <div class="content-list">
                        ${module.content.map(item => `
                            <div class="content-item">
                                <h4>${item.title}</h4>
                                ${item.content_text ? `<p>${item.content_text}</p>` : ''}
                                ${item.content_url ? `<a href="${item.content_url}" target="_blank" class="btn-download">View/Download</a>` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        async function viewAssignment(assignmentId) {
            const assignment = await apiCall(`/assignments/${assignmentId}`);
            let submission = null;
            try {
                submission = await apiCall(`/assignments/${assignmentId}/submission`);
            } catch (e) {
                // No submission yet
            }
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('assignments')" class="btn-back">← Back</button>
                    <h2>${assignment.title}</h2>
                </div>
                <div class="assignment-details">
                    <p><strong>Description:</strong></p>
                    <p>${assignment.description || ''}</p>
                    <p><strong>Points:</strong> ${assignment.total_points}</p>
                    <p><strong>Due Date:</strong> ${assignment.due_date ? new Date(assignment.due_date).toLocaleString() : 'No due date'}</p>
                    ${assignment.instructions ? `<p><strong>Instructions:</strong><br>${assignment.instructions}</p>` : ''}
                    ${currentUser.role === 'student' ? `
                        <div class="submission-section">
                            <h3>Your Submission</h3>
                            ${submission ? `
                                <p><strong>Submitted:</strong> ${new Date(submission.submitted_at).toLocaleString()}</p>
                                ${submission.submission_text ? `<p>${submission.submission_text}</p>` : ''}
                                <p>Status: ${submission.status}</p>
                            ` : `
                                <form id="submitForm" onsubmit="submitAssignment(event, ${assignmentId})">
                                    <textarea name="submission_text" placeholder="Enter your submission text" rows="10"></textarea>
                                    <input type="file" name="files" multiple>
                                    <button type="submit" class="btn-primary">Submit Assignment</button>
                                </form>
                            `}
                        </div>
                    ` : ''}
                </div>
            `;
        }

        async function submitAssignment(e, assignmentId) {
            e.preventDefault();
            // Simplified - would need FormData for file uploads
            alert('File upload submission requires FormData. This is a simplified demo.');
        }

        async function loadModules() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Learning Modules</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Modules</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadAssignments() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Assignments</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Assignments</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function loadGrades() {
            const courses = await apiCall('/courses');
            let allGrades = [];
            
            for (const course of courses) {
                try {
                    const grades = await apiCall(`/grades/course/${course.id}`);
                    allGrades = allGrades.concat(grades.map(g => ({...g, course_name: course.course_name})));
                } catch (e) {
                    // Skip if no grades
                }
            }
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Grades</h2>
                </div>
                <div class="grades-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Course</th>
                                <th>Assignment</th>
                                <th>Points Earned</th>
                                <th>Points Possible</th>
                                <th>Percentage</th>
                                <th>Letter Grade</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${allGrades.map(grade => `
                                <tr>
                                    <td>${grade.course_name}</td>
                                    <td>${grade.assignment_title || grade.grade_type}</td>
                                    <td>${grade.points_earned}</td>
                                    <td>${grade.points_possible}</td>
                                    <td>${grade.percentage}%</td>
                                    <td>${grade.letter_grade}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadAttendance() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Attendance</h2>
                </div>
                <div class="courses-list">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewAttendance(${course.id})" class="btn-view">View Attendance</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewAttendance(courseId) {
            const attendance = await apiCall(`/attendance/course/${courseId}`);
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('attendance')" class="btn-back">← Back</button>
                    <h2>Attendance Records</h2>
                </div>
                <div class="attendance-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Notes</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${attendance.map(record => `
                                <tr>
                                    <td>${new Date(record.attendance_date).toLocaleDateString()}</td>
                                    <td>${record.status}</td>
                                    <td>${record.notes || ''}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function loadMessages() {
            const messages = await apiCall('/email/inbox');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Messages</h2>
                    <button onclick="showComposeMessage()" class="btn-primary">Compose</button>
                </div>
                <div class="messages-list">
                    ${messages.map(msg => `
                        <div class="message-card ${msg.is_read ? '' : 'unread'}">
                            <h4>${msg.subject}</h4>
                            <p><strong>From:</strong> ${msg.sender_first_name} ${msg.sender_last_name}</p>
                            <p>${msg.message_body.substring(0, 100)}...</p>
                            <button onclick="viewMessage(${msg.id})" class="btn-view">Read</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Load dashboard with term selection (for teachers, students, and all admin roles)
        async function loadDashboard() {
            const content = document.getElementById('dashboardContent');
            const currentYear = new Date().getFullYear();
            const role = currentUser.role;
            const roleName = role === 'teacher' ? 'Teacher' : 
                           role === 'student' ? 'Student' : 
                           role === 'headteacher' ? 'Headteacher' :
                           role === 'deputy_headteacher' ? 'Deputy Headteacher' :
                           role === 'superadmin' ? 'Superadmin' :
                           role === 'finance' ? 'Finance Administrator' : 'Dashboard';
            
            try {
                // Get terms
                const terms = await apiCall(`/courses/terms?academic_year=${currentYear}`);
                
                content.innerHTML = `
                    <div class="view-header">
                        <h2>${roleName} Dashboard - ${currentYear}</h2>
                    </div>
                    <div class="terms-grid">
                        ${terms.length === 0 ? `
                            <div class="welcome-message">
                                <p>No terms available. ${(role === 'headteacher' || role === 'superadmin') ? 'Please create terms first.' : 'Contact administrator.'}</p>
                            </div>
                        ` : terms.map(term => `
                            <div class="term-card">
                                <h3>${term.name}</h3>
                                <p class="term-date-range">${term.dateRange}</p>
                                <p><strong>Courses:</strong> ${term.course_count || 0}</p>
                                <button onclick="selectTerm(${term.term}, '${term.academic_year}')" class="btn-primary">Select Term</button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `<div class="error">Error loading dashboard: ${error.message}</div>`;
            }
        }

        // Teacher: Load dashboard with term selection
        async function loadTeacherDashboard() {
            await loadDashboard();
        }

        // Student: Load dashboard with term selection (same as teacher)
        async function loadStudentDashboard() {
            await loadDashboard();
        }

        // Admin: Load dashboard with term selection (same interface)
        async function loadAdminDashboard() {
            await loadDashboard();
        }

        // Store current term and academic year
        let currentTerm = null;
        let currentAcademicYear = null;

        // Teacher: Select term and show courses
        async function selectTerm(term, academicYear) {
            currentTerm = term;
            currentAcademicYear = academicYear;
            await loadTermCourses();
        }

        // Load courses for selected term (works for all roles)
        async function loadTermCourses() {
            if (!currentTerm || !currentAcademicYear) {
                loadDashboard();
                return;
            }
            
            const role = currentUser.role;
            let courses;
            
            // Get courses based on role
            if (role === 'teacher') {
                courses = await apiCall(`/courses/term/${currentTerm}/${currentAcademicYear}`);
            } else if (role === 'student') {
                courses = await apiCall(`/courses?academic_year=${currentAcademicYear}`);
            } else {
                // Admin roles see all courses for the term
                courses = await apiCall(`/courses?academic_year=${currentAcademicYear}`);
            }
            
            const content = document.getElementById('dashboardContent');
            const currentYear = new Date().getFullYear();
            
            // Get term details to show proper name and date range
            const terms = await apiCall(`/courses/terms?academic_year=${currentYear}`);
            const selectedTerm = terms.find(t => t.term === currentTerm);
            const termName = selectedTerm ? `${selectedTerm.name} (${selectedTerm.dateRange})` : `Term ${currentTerm} ${currentYear}`;
            
            const canCreateCourse = ['teacher', 'headteacher', 'superadmin', 'deputy_headteacher'].includes(role);
            const canManageCourse = ['teacher', 'headteacher', 'superadmin', 'deputy_headteacher'].includes(role);
            
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('dashboard')" class="btn-back">← Back to Terms</button>
                    <h2>${termName} - Courses</h2>
                    ${['headteacher', 'superadmin', 'deputy_headteacher'].includes(role) ? `<button onclick="loadView('assign-teachers')" class="btn-primary">Assign Teachers to Subjects</button>` : ''}
                </div>
                <div class="courses-grid">
                    ${courses.length === 0 ? `
                        <div class="welcome-message">
                            <p>No courses for this term. ${canCreateCourse ? 'Create a new course to get started.' : ''}</p>
                        </div>
                    ` : courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p>${course.description || ''}</p>
                            ${['teacher', 'headteacher', 'superadmin'].includes(role) ? `<p><strong>Students:</strong> ${course.enrolled_students || 0}</p>` : ''}
                            ${canManageCourse ? `
                                <button onclick="viewCourseDetails(${course.id})" class="btn-view">Open Course</button>
                            ` : `
                                <button onclick="viewCourse(${course.id})" class="btn-view">View Course</button>
                            `}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // View course details with modules, attendance, assignments (teachers and admins)
        async function viewCourseDetails(courseId) {
            if (!currentTerm || !currentAcademicYear) {
                alert('Please select a term first');
                loadDashboard();
                return;
            }
            
            const [course, modules, assignments] = await Promise.all([
                apiCall(`/courses/${courseId}`),
                apiCall(`/modules/course/${courseId}?term=${currentTerm}&academic_year=${currentAcademicYear}`),
                apiCall(`/assignments/course/${courseId}`)
            ]);
            
            const content = document.getElementById('dashboardContent');
            const currentYear = new Date().getFullYear();
            const termNames = {
                1: `Term 1 ${currentYear} (January - April)`,
                2: `Term 2 ${currentYear} (April - July)`,
                3: `Term 3 ${currentYear} (August - October)`
            };
            const termName = termNames[currentTerm] || `Term ${currentTerm} ${currentYear}`;
            
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadTermCourses()" class="btn-back">← Back to Courses</button>
                    <h2>${course.course_name} - ${termName}</h2>
                </div>
                
                <div class="course-tabs">
                    <button onclick="showCourseTab('modules')" class="tab-btn active" id="tab-modules">Learning Modules</button>

        // Subject search functions (global scope)
        function filterSubjects(searchTerm) {
            const resultsDiv = document.getElementById('subject-results');
            if (!resultsDiv || !window.allCourses) return;
            
            if (!searchTerm || searchTerm.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }
            
            const searchLower = searchTerm.toLowerCase();
            const filtered = window.allCourses.filter(c => {
                const name = (c.course_name || '').toLowerCase();
                const code = (c.course_code || '').toLowerCase();
                return name.includes(searchLower) || code.includes(searchLower);
            });
            
            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="subject-result-item" style="padding: 1rem; color: #666;">No subjects found</div>';
            } else {
                resultsDiv.innerHTML = filtered.slice(0, 10).map(c => {
                    const safeName = (c.course_name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeCode = (c.course_code || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return '<div class="subject-result-item" onclick="selectSubject(' + c.id + ', \'' + safeName + '\', \'' + safeCode + '\')">' +
                        '<strong>' + (c.course_name || '') + '</strong>' +
                        '<span style="color: #666; font-size: 0.875rem;"> (' + (c.course_code || '') + ')</span>' +
                        '</div>';
                }).join('');
            }
            
            resultsDiv.style.display = 'block';
        }
        
        function showSubjectResults() {
            const searchInput = document.getElementById('subject-search-input');
            if (searchInput && searchInput.value.length >= 1) {
                filterSubjects(searchInput.value);
            }
        }
        
        function selectSubject(courseId, courseName, courseCode) {
            const courseIdEl = document.getElementById('selected-course-id');
            const subjectNameEl = document.getElementById('selected-subject-name');
            const displayEl = document.getElementById('selected-subject-display');
            const resultsEl = document.getElementById('subject-results');
            const searchInput = document.getElementById('subject-search-input');
            
            if (courseIdEl) courseIdEl.value = courseId;
            if (subjectNameEl) subjectNameEl.textContent = courseName + ' (' + courseCode + ')';
            if (displayEl) displayEl.style.display = 'block';
            if (resultsEl) resultsEl.style.display = 'none';
            if (searchInput) searchInput.value = '';
        }
        
        function clearSubjectSelection() {
            const courseIdEl = document.getElementById('selected-course-id');
            const displayEl = document.getElementById('selected-subject-display');
            const searchInput = document.getElementById('subject-search-input');
            
            if (courseIdEl) courseIdEl.value = '';
            if (displayEl) displayEl.style.display = 'none';
            if (searchInput) searchInput.focus();
        }

            const data = Object.fromEntries(formData);
            const termId = data.id;
            
            try {
                if (termId) {
                    // Update existing term
                    await apiCall(`/terms/${termId}`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            name: data.name,
                            date_range_start: data.date_range_start,
                            date_range_end: data.date_range_end,
                            start_date: data.start_date || null,
                            end_date: data.end_date || null
                        })
                    });
                    alert('Term updated successfully!');
                } else {
                    // Create new term
                    await apiCall('/terms', {
                        method: 'POST',
                        body: JSON.stringify({
                            term_number: parseInt(data.term_number),
                            academic_year: data.academic_year,
                            name: data.name,
                            date_range_start: data.date_range_start,
                            date_range_end: data.date_range_end,
                            start_date: data.start_date || null,
                            end_date: data.end_date || null
                        })
                    });
                    alert('Term created successfully!');
                }
                closeTermModal();
                loadManageTerms();
            } catch (error) {
                alert('Error saving term: ' + error.message);
            }
        }

        function renderCoursesByCategory(coursesByCategory, currentEnrollments) {
            const enrolledCourseIds = currentEnrollments.map(e => e.course_id);
            
            const categories = [
                { key: 'core', title: 'Core Subjects', courses: coursesByCategory.core },
                { key: 'languages', title: 'Languages', courses: coursesByCategory.languages },
                { key: 'sciences', title: 'Sciences', courses: coursesByCategory.sciences },
                { key: 'arts', title: 'Arts & Sports', courses: coursesByCategory.arts },
                { key: 'social_sciences', title: 'Social Sciences', courses: coursesByCategory.social_sciences },
                { key: 'technical', title: 'Technical Subjects', courses: coursesByCategory.technical },
                { key: 'other', title: 'Other Subjects', courses: coursesByCategory.other }
            ];

            return categories.map(category => {
                if (category.courses.length === 0) return '';
                
                return `
                    <div class="course-category">
                        <h4>${category.title}</h4>
                        <div class="category-courses">
                            ${category.courses.map(course => {
                                const isEnrolled = enrolledCourseIds.includes(course.id);
                                return `
                                    <div class="course-item ${isEnrolled ? 'enrolled' : ''}">
                                        <label>
                                            <input type="checkbox" 
                                                   ${isEnrolled ? 'checked disabled' : ''} 
                                                   value="${course.id}"
                                                   onchange="toggleCourseEnrollment(${course.id}, this.checked)">
                                            <strong>${course.course_name}</strong> (${course.course_code})
                                            ${course.teacher_first_name ? `<br><small>Teacher: ${course.teacher_first_name} ${course.teacher_last_name}</small>` : ''}
                                        </label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleCourseEnrollment(courseId, add) {
            if (!selectedStudentId) {
                alert('Please select a student first');
                return;
            }

            try {
                if (add) {
                    // Add enrollment
                    await apiCall(`/student-registration/enroll/${selectedStudentId}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            course_ids: [courseId],
                            term: currentTerm,
                            academic_year: currentAcademicYear
                        })
                    });
                    alert('Course added successfully!');
                } else {
                    // Find enrollment ID and remove
                    const enrollments = await apiCall(`/student-registration/students/${selectedStudentId}/enrollments?academic_year=${currentAcademicYear}`);
                    const enrollment = enrollments.find(e => e.course_id === courseId);
                    if (enrollment) {
                        await apiCall(`/student-registration/enrollments/${enrollment.id}`, { method: 'DELETE' });
                        alert('Course removed successfully!');
                    }
                }
                
                // Reload course management
                loadStudentCourseManagement(selectedStudentId);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function removeEnrollment(enrollmentId) {
            if (!confirm('Are you sure you want to remove this course enrollment?')) return;

            try {
                await apiCall(`/student-registration/enrollments/${enrollmentId}`, { method: 'DELETE' });
                alert('Course enrollment removed successfully!');
                loadStudentCourseManagement(selectedStudentId);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

            const [courses, teachers] = await Promise.all([
                apiCall('/courses'),
                apiCall('/users?role=teacher')
            ]);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>Allocate Courses to Teachers</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p>Current Teacher: ${course.teacher_first_name || 'None'} ${course.teacher_last_name || ''}</p>
                            <select id="teacher_${course.id}" class="form-select">
                                <option value="">Select Teacher</option>
                                ${teachers.map(t => `<option value="${t.id}" ${t.id === course.teacher_id ? 'selected' : ''}>${t.first_name} ${t.last_name}</option>`).join('')}
                            </select>
                            <button onclick="allocateCourse(${course.id})" class="btn-primary">Allocate</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function allocateCourse(courseId) {
            const teacherId = document.getElementById(`teacher_${courseId}`).value;
            if (!teacherId) {
                alert('Please select a teacher');
                return;
            }
            
            try {
                await apiCall('/admin/allocate-course', {
                    method: 'POST',
                    body: JSON.stringify({ teacher_id: parseInt(teacherId), course_id: courseId })
                });
                alert('Course allocated successfully!');
                showAllocateCourses();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        // Admin: Load all courses
        async function loadAllCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>All Courses</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p><strong>Teacher:</strong> ${course.teacher_first_name || ''} ${course.teacher_last_name || 'Unassigned'}</p>
                            <p><strong>Students:</strong> ${course.enrolled_students || 0}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Superadmin: Load users with pagination
        let currentUserPage = 1;
        let currentUserFilters = {};

        async function loadUsers(page = 1, filters = {}) {
            currentUserPage = page;
            currentUserFilters = filters;
            
            const queryParams = new URLSearchParams({
                page: page,
                limit: 20,
                ...filters
            });
            
            const data = await apiCall(`/admin/users?${queryParams}`);
            const content = document.getElementById('dashboardContent');
            
            content.innerHTML = `
                <div class="view-header">
                    <h2>User Management</h2>
                    <button onclick="showAddUserForm()" class="btn-primary">Add User</button>
                </div>
                
                <div class="users-filters">
                    <div class="filter-group">
                        <label>Search:</label>
                        <input type="text" id="user-search" placeholder="Search by name, username, or email" 
                               value="${filters.search || ''}" onkeyup="filterUsers()">
                    </div>
                    <div class="filter-group">
                        <label>Role:</label>
                        <select id="user-role-filter" onchange="filterUsers()">
                            <option value="">All Roles</option>
                            <option value="student" ${filters.role === 'student' ? 'selected' : ''}>Student</option>
                            <option value="teacher" ${filters.role === 'teacher' ? 'selected' : ''}>Teacher</option>
                            <option value="headteacher" ${filters.role === 'headteacher' ? 'selected' : ''}>Headteacher</option>
                            <option value="parent" ${filters.role === 'parent' ? 'selected' : ''}>Parent</option>
                            <option value="superadmin" ${filters.role === 'superadmin' ? 'selected' : ''}>Superadmin</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status:</label>
                        <select id="user-status-filter" onchange="filterUsers()">
                            <option value="">All</option>
                            <option value="true" ${filters.is_active === 'true' ? 'selected' : ''}>Active</option>
                            <option value="false" ${filters.is_active === 'false' ? 'selected' : ''}>Inactive</option>
                        </select>
                    </div>
                    <button onclick="clearUserFilters()" class="btn-secondary">Clear Filters</button>
                </div>
                
                <div class="users-table">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.users.length === 0 ? `
                                <tr>
                                    <td colspan="7" style="text-align: center; padding: 2rem;">
                                        No users found.
                                    </td>
                                </tr>
                            ` : data.users.map(user => `
                                <tr>
                                    <td>${user.first_name} ${user.last_name}</td>
                                    <td>${user.username}</td>
                                    <td>${user.email}</td>
                                    <td>${user.role}</td>
                                    <td>${user.is_active ? '<span class="status-active">Active</span>' : '<span class="status-inactive">Inactive</span>'}</td>
                                    <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                    <td>
                                        <button onclick="editUser(${user.id})" class="btn-small">Edit</button>
                                        <button onclick="toggleUserStatus(${user.id}, ${!user.is_active})" class="btn-small ${user.is_active ? 'btn-danger' : ''}">${user.is_active ? 'Deactivate' : 'Activate'}</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                
                <div class="pagination">
                    <div class="pagination-info">
                        Showing ${((page - 1) * 20) + 1} to ${Math.min(page * 20, data.pagination.total_items)} of ${data.pagination.total_items} users
                    </div>
                    <div class="pagination-controls">
                        <button onclick="loadUsers(${page - 1}, currentUserFilters)" 
                                ${!data.pagination.has_prev ? 'disabled' : ''} 
                                class="btn-secondary">Previous</button>
                        <span class="page-numbers">
                            ${generatePageNumbers(page, data.pagination.total_pages).map(p => 
                                p === '...' ? '<span>...</span>' : 
                                `<button onclick="loadUsers(${p}, currentUserFilters)" 
                                         class="${p === page ? 'active' : ''}">${p}</button>`
                            ).join('')}
                        </span>
                        <button onclick="loadUsers(${page + 1}, currentUserFilters)" 
                                ${!data.pagination.has_next ? 'disabled' : ''} 
                                class="btn-secondary">Next</button>
                    </div>
                </div>
            `;
        }

        function generatePageNumbers(currentPage, totalPages) {
            const pages = [];
            const maxVisible = 5;
            
            if (totalPages <= maxVisible) {
                for (let i = 1; i <= totalPages; i++) {
                    pages.push(i);
                }
            } else {
                if (currentPage <= 3) {
                    for (let i = 1; i <= 4; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(totalPages);
                } else if (currentPage >= totalPages - 2) {
                    pages.push(1);
                    pages.push('...');
                    for (let i = totalPages - 3; i <= totalPages; i++) {
                        pages.push(i);
                    }
                } else {
                    pages.push(1);
                    pages.push('...');
                    for (let i = currentPage - 1; i <= currentPage + 1; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(totalPages);
                }
            }
            
            return pages;
        }

        let userFilterTimeout;
        function filterUsers() {
            clearTimeout(userFilterTimeout);
            userFilterTimeout = setTimeout(() => {
                const filters = {
                    search: document.getElementById('user-search').value.trim() || undefined,
                    role: document.getElementById('user-role-filter').value || undefined,
                    is_active: document.getElementById('user-status-filter').value || undefined
                };
                loadUsers(1, filters);
            }, 500);
        }

        function clearUserFilters() {
            document.getElementById('user-search').value = '';
            document.getElementById('user-role-filter').value = '';
            document.getElementById('user-status-filter').value = '';
            loadUsers(1, {});
        }

        async function toggleUserStatus(userId, isActive) {
            try {
                await apiCall(`/admin/users/${userId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ is_active: isActive })
                });
                alert(`User ${isActive ? 'activated' : 'deactivated'}!`);
                loadUsers(currentUserPage, currentUserFilters);
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

            alert('Edit user feature coming soon!');

        }

        function showAddUserForm() {
            alert('Add user feature coming soon!');

        }

        // Parent: Load children
        async function loadChildren() {
            const children = await apiCall(`/users/parent/${currentUser.id}/students`);
            const content = document.getElementById('dashboardContent');
            
            if (children.length === 0) {
                content.innerHTML = `
                    <div class="view-header">
                        <h2>My Children</h2>
                    </div>
                    <div class="welcome-message">
                        <p>No children linked to your account.</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Children</h2>
                </div>
                <div class="children-list">
                    ${children.map(child => `
                        <div class="child-card">
                            <h3>${child.first_name} ${child.last_name}</h3>
                            <p>Email: ${child.email}</p>
                            <button onclick="viewChildProgress(${child.id})" class="btn-view">View Progress</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewChildProgress(studentId) {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('children')" class="btn-back">← Back</button>
                    <h2>Child's Progress</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewChildCourse(${course.id}, ${studentId})" class="btn-view">View Details</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewChildCourse(courseId, studentId) {
            const [grades, attendance] = await Promise.all([
                apiCall(`/grades/course/${courseId}/student/${studentId}/summary`),
                apiCall(`/attendance/course/${courseId}?student_id=${studentId}`)
            ]);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="viewChildProgress(${studentId})" class="btn-back">← Back</button>
                    <h2>Course Details</h2>
                </div>
                <div class="child-details">
                    <h3>Grades</h3>
                    <p>Current Average: ${grades.currentAverage}%</p>
                    <p>Final Grade: ${grades.finalGrade ? grades.finalGrade.letter_grade : 'N/A'}</p>
                    <h3>Attendance</h3>
                    <p>Total Records: ${attendance.length}</p>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('authToken');
            location.reload();
        }
    </script>
