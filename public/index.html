                            <button onclick="searchStudentByAdmission()" class="btn-primary">Search</button>
                        </div>
                    </div>
                    <div id="student-search-results"></div>
                </div>
                
            `;
        }

        let selectedStudentId = null;
        let selectedStudentInfo = null;
        let pendingCourseSelections = new Set(); // Track selected courses before saving

        async function searchStudentByAdmission() {
            const admissionNumber = document.getElementById('admission-number-search').value.trim();
            
            if (!admissionNumber) {
                alert('Please enter an admission number');
                return;
            }

            try {
                const students = await apiCall(`/student-registration/students?admission_number=${encodeURIComponent(admissionNumber)}`);
                const resultsDiv = document.getElementById('student-search-results');
                
                if (students.length === 0) {
                    resultsDiv.innerHTML = '<div class="error">No student found with this admission number.</div><div style="margin-top: 1rem; padding: 1rem; background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px;"><strong>Tip:</strong> If this is a new student, use the "Register New Student" tab to create their account first.</div>';
                    return;
                }

                const student = students[0];
                selectedStudentId = student.id;
                selectedStudentInfo = student;
                
                resultsDiv.innerHTML = `
                    <div class="success-message">
                        <p><strong>Student Found:</strong> ${student.first_name} ${student.last_name}</p>
                        <p>Username: ${student.username} | Email: ${student.email}</p>
                        ${student.pathway_name ? `<p>Pathway: ${student.pathway_name}</p>` : ''}
                        <button onclick="loadStudentCourseManagement(${student.id})" class="btn-primary">Manage Learning Areas</button>
                    </div>
                `;
            } catch (error) {
                document.getElementById('student-search-results').innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        async function loadStudentCourseManagement(studentId) {
            console.log('loadStudentCourseManagement called with studentId:', studentId);
            
            // Ensure studentId is a number
            studentId = parseInt(studentId);
            if (isNaN(studentId)) {
                alert('Invalid student ID');
                return;
            }
            
            selectedStudentId = studentId;
            pendingCourseSelections.clear();
            
            // If no academic year is set, try to get the current year
            if (!currentAcademicYear) {
                const currentYear = new Date().getFullYear();
                currentAcademicYear = `${currentYear}-${currentYear + 1}`;
                console.log('Auto-set academic year to:', currentAcademicYear);
            }
            
            // If no term is set, default to term 1
            if (!currentTerm) {
                currentTerm = 1;
                console.log('Auto-set term to:', currentTerm);
            }
            
            // If student info is not available, fetch it
            if (!selectedStudentInfo || selectedStudentInfo.id !== studentId) {
                try {
                    console.log('Fetching student info for ID:', studentId);
                    const students = await apiCall(`/student-registration/students?search=${studentId}`);
                    if (students && students.length > 0) {
                        selectedStudentInfo = students.find(s => s.id === studentId) || students[0];
                        console.log('Found student info:', selectedStudentInfo);
                    } else {
                        // Try to get student by ID directly
                        const studentData = await apiCall(`/users/${studentId}`);
                        selectedStudentInfo = {
                            id: studentData.id,
                            first_name: studentData.first_name,
                            last_name: studentData.last_name,
                            username: studentData.username,
                            email: studentData.email,
                            admission_number: null,
                            pathway_name: null
                        };
                        console.log('Fetched student from users table:', selectedStudentInfo);
                    }
                } catch (e) {
                    console.error('Error fetching student info:', e);
                    // Continue with basic info
                    selectedStudentInfo = {
                        id: studentId,
                        first_name: 'Student',
                        last_name: `#${studentId}`,
                        username: '',
                        email: '',
                        admission_number: null,
                        pathway_name: null
                    };
                }
            }
            
            try {
                console.log('Fetching enrollments and courses...');
                const [currentEnrollments, coursesByCategory] = await Promise.all([
                    apiCall(`/student-registration/students/${studentId}/enrollments?academic_year=${currentAcademicYear}`),
                    apiCall(`/courses/by-category/${currentAcademicYear}`)
                ]);

                const student = selectedStudentInfo;
                
                // Create modal popup
                const modal = document.createElement('div');
                modal.id = 'course-management-modal';
                modal.className = 'modal-overlay';
                modal.onclick = function(e) {
                    if (e.target === modal) {
                        closeCourseManagementModal();
                    }
                };
                modal.innerHTML = `
                    <div class="modal-content modal-large">
                        <div class="modal-header">
                            <h2>Manage Learning Areas - ${student.first_name} ${student.last_name}</h2>
                            <button onclick="closeCourseManagementModal()" class="modal-close">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="student-info-card" style="margin-bottom: 1.5rem;">
                                <p><strong>Admission Number:</strong> ${student.admission_number || 'N/A'}</p>
                                <p><strong>Pathway:</strong> ${student.pathway_name || 'Not assigned'}</p>
                                <p><strong>Term:</strong> ${currentTerm} ${currentAcademicYear}</p>
                            </div>

                            <div class="enrollments-section" style="margin-bottom: 2rem;">
                                <h3>Current Learning Area Enrollments (${currentEnrollments.length})</h3>
                                ${currentEnrollments.length === 0 ? `
                                    <p>No learning areas enrolled for this academic year.</p>
                                ` : `
                                    <div class="enrollments-list">
                                        ${currentEnrollments.map(enrollment => `
                                            <div class="enrollment-item">
                                                <div>
                                                    <strong>${enrollment.course_name}</strong> (${enrollment.course_code})
                                                    ${enrollment.teacher_first_name ? `<br><small>Teacher: ${enrollment.teacher_first_name} ${enrollment.teacher_last_name}</small>` : ''}
                                                </div>
                                                <button onclick="removeEnrollment(${enrollment.id})" class="btn-danger btn-small">Remove</button>
                                            </div>
                                        `).join('')}
                                    </div>
                                `}
                            </div>

                            <div class="courses-by-category">
                                <h3>Available Learning Areas - Select to Add</h3>
                                ${renderCoursesByCategory(coursesByCategory, currentEnrollments)}
                            </div>

                            <div id="save-enrollments-section" style="margin-top: 2rem; padding: 1.5rem; background: #e3f2fd; border: 2px solid #2196f3; border-radius: 8px; display: none; position: sticky; bottom: 0; z-index: 100;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                    <p style="margin: 0; font-size: 1.1rem;"><strong>Selected: <span id="selected-count" style="color: #1976d2; font-size: 1.2rem; font-weight: bold;">0</span> learning area(s)</strong></p>
                                </div>
                                <div style="display: flex; gap: 0.5rem;">
                                    <button id="save-enrollments-btn" onclick="saveSelectedEnrollments()" class="btn-primary" style="padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: bold;">Save Enrollments</button>
                                    <button onclick="clearPendingSelections()" class="btn-secondary" style="padding: 0.75rem 1.5rem;">Clear Selection</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                // Remove any existing modal first
                const existingModal = document.getElementById('course-management-modal');
                if (existingModal) {
                    existingModal.remove();
                }
                
                document.body.appendChild(modal);
                
                // Ensure modal is visible
                modal.style.display = 'flex';
                
                // Show modal with animation
                setTimeout(() => {
                    modal.classList.add('show');
                }, 10);
                
                updateSaveButton();
                
                // Close on Escape key
                const escapeHandler = (e) => {
                    if (e.key === 'Escape') {
                        closeCourseManagementModal();
                        document.removeEventListener('keydown', escapeHandler);
                    }
                };
                document.addEventListener('keydown', escapeHandler);
                
                console.log('Modal created and displayed successfully');
            } catch (error) {
                console.error('Error loading course management:', error);
                alert('Error loading course management: ' + (error.message || 'Unknown error. Please check the console (F12) for details.'));
            }
        }

        function closeCourseManagementModal() {
            const modal = document.getElementById('course-management-modal');
            if (modal) {
                modal.classList.remove('show');
                setTimeout(() => {
                    modal.remove();
                }, 300);
            }
            pendingCourseSelections.clear();
        }

        function clearPendingSelections() {
            pendingCourseSelections.clear();
            // Uncheck all pending checkboxes
            document.querySelectorAll('input[type="checkbox"].course-checkbox-input:checked').forEach(cb => {
                cb.checked = false;
            });
            // Also uncheck by data attribute
            document.querySelectorAll('input[type="checkbox"][data-course-id]').forEach(cb => {
                const courseId = parseInt(cb.getAttribute('data-course-id'));
                if (pendingCourseSelections.has(courseId)) {
                    cb.checked = false;
                }
            });
            updateSaveButton();
        }

        function renderCoursesByCategory(coursesByCategory, currentEnrollments) {
            const enrolledCourseIds = currentEnrollments.map(e => e.course_id);
            
            const categories = [
                { key: 'core', title: 'Core Subjects', courses: coursesByCategory.core },
                { key: 'languages', title: 'Languages', courses: coursesByCategory.languages },
                { key: 'sciences', title: 'Sciences', courses: coursesByCategory.sciences },
                { key: 'arts', title: 'Arts & Sports', courses: coursesByCategory.arts },
                { key: 'social_sciences', title: 'Social Sciences', courses: coursesByCategory.social_sciences },
                { key: 'technical', title: 'Technical Subjects', courses: coursesByCategory.technical },
                { key: 'other', title: 'Other Subjects', courses: coursesByCategory.other }
            ];

            return categories.map(category => {
                if (category.courses.length === 0) return '';
                
                return `
                    <div class="course-category">
                        <h4>${category.title}</h4>
                        <div class="category-courses">
                            ${category.courses.map(course => {
                                const isEnrolled = enrolledCourseIds.includes(course.id);
                                const isPending = pendingCourseSelections.has(course.id);
                                return `
                                    <div class="course-item ${isEnrolled ? 'enrolled' : ''} ${isPending ? 'pending' : ''}">
                                        <label>
                                            <input type="checkbox" 
                                                   ${isEnrolled ? 'checked disabled' : ''} 
                                                   ${isPending ? 'checked' : ''}
                                                   value="${course.id}"
                                                   data-course-id="${course.id}"
                                                   onchange="toggleCourseSelection(${course.id}, this.checked)"
                                                   ${isEnrolled ? '' : 'class="course-checkbox-input"'}
                                                   ${isEnrolled ? '' : 'id="course-checkbox-' + course.id + '"'}>
                                            <strong>${course.course_name}</strong> (${course.course_code})
                                            ${course.teacher_first_name ? `<br><small>Teacher: ${course.teacher_first_name} ${course.teacher_last_name}</small>` : ''}
                                        </label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleCourseSelection(courseId, checked) {
            const courseIdNum = parseInt(courseId);
            console.log('Toggle course selection:', courseIdNum, checked);
            if (checked) {
                pendingCourseSelections.add(courseIdNum);
            } else {
                pendingCourseSelections.delete(courseIdNum);
            }
            console.log('Pending selections:', Array.from(pendingCourseSelections));
            updateSaveButton();
        }

        function updateSaveButton() {
            const saveSection = document.getElementById('save-enrollments-section');
            const countSpan = document.getElementById('selected-count');
            const count = pendingCourseSelections.size;
            
            if (saveSection) {
                if (count > 0) {
                    saveSection.style.display = 'block';
                    // Scroll to save section to make it visible
                    setTimeout(() => {
                        saveSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
                    }, 100);
                } else {
                    saveSection.style.display = 'none';
                }
            }
            if (countSpan) {
                countSpan.textContent = count.toString();
                countSpan.innerText = count.toString(); // Force update
            }
            
            // Also update visual feedback on checkboxes
            document.querySelectorAll('input[type="checkbox"][data-course-id]').forEach(cb => {
                const courseId = parseInt(cb.getAttribute('data-course-id'));
                const isPending = pendingCourseSelections.has(courseId);
                const courseItem = cb.closest('.course-item');
                if (courseItem) {
                    if (isPending && !courseItem.classList.contains('enrolled')) {
                        courseItem.classList.add('pending');
                    } else {
                        courseItem.classList.remove('pending');
                    }
                }
            });
        }

        async function saveSelectedEnrollments() {
            if (!selectedStudentId) {
                alert('Please select a student first');
                return;
            }

            if (pendingCourseSelections.size === 0) {
                alert('Please select at least one learning area to enroll');
                return;
            }

            if (!currentTerm || !currentAcademicYear) {
                alert('Please select a term first from the dashboard');
                return;
            }

            const courseIds = Array.from(pendingCourseSelections);
            console.log('Saving enrollments:', {
                studentId: selectedStudentId,
                courseIds: courseIds,
                term: currentTerm,
                academicYear: currentAcademicYear
            });
            
            // Disable save button to prevent double submission
            const saveBtn = document.getElementById('save-enrollments-btn');
            if (saveBtn) {
                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';
            }
            
            try {
                const result = await apiCall(`/student-registration/enroll/${selectedStudentId}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        course_ids: courseIds,
                        term: currentTerm,
                        academic_year: currentAcademicYear
                    })
                });
                
                alert(`Successfully enrolled in ${result.courses_enrolled || courseIds.length} learning area(s)!`);
                pendingCourseSelections.clear();
                
                // Reload course management
                await loadStudentCourseManagement(selectedStudentId);
            } catch (error) {
                console.error('Enrollment error:', error);
                console.error('Error details:', {
                    message: error.message,
                    response: error.response,
                    status: error.status
                });
                
                // Re-enable save button
                if (saveBtn) {
                    saveBtn.disabled = false;
                    saveBtn.textContent = 'Save Enrollments';
                }
                
                const errorMsg = error.message || 'Server error. Please check the console (F12) for details.';
                alert('Error: ' + errorMsg);
            }
        }

        async function toggleCourseEnrollment(courseId, add) {
            if (!selectedStudentId) {
                alert('Please select a student first');
                return;
            }

            if (!courseId) {
                alert('Invalid course ID');
                return;
            }

            // Ensure courseId is a number
            const courseIdNum = parseInt(courseId);
            if (isNaN(courseIdNum)) {
                alert('Invalid course ID format');
                return;
            }

            try {
                if (add) {
                    // Add enrollment
                    const result = await apiCall(`/student-registration/enroll/${selectedStudentId}`, {
                        method: 'POST',
                        body: JSON.stringify({
                            course_ids: [courseIdNum],
                            term: currentTerm,
                            academic_year: currentAcademicYear
                        })
                    });
                    alert('Learning area added successfully!');
                } else {
                    // Find enrollment ID and remove
                    const enrollments = await apiCall(`/student-registration/students/${selectedStudentId}/enrollments?academic_year=${currentAcademicYear}`);
                    const enrollment = enrollments.find(e => e.course_id === courseIdNum);
                    if (enrollment) {
                        await apiCall(`/student-registration/enrollments/${enrollment.id}`, { method: 'DELETE' });
                        alert('Learning area removed successfully!');
                    }
                }
                
                // Reload course management
                loadStudentCourseManagement(selectedStudentId);
            } catch (error) {
                console.error('Enrollment error:', error);
                alert('Error: ' + (error.message || 'Server error. Please check the console for details.'));
            }
        }

        async function removeEnrollment(enrollmentId) {
            if (!confirm('Are you sure you want to remove this learning area enrollment?')) return;

            try {
                await apiCall(`/student-registration/enrollments/${enrollmentId}`, { method: 'DELETE' });
                alert('Learning area enrollment removed successfully!');
                if (selectedStudentId) {
                    loadStudentCourseManagement(selectedStudentId);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function showRegistrationTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            const newForm = document.getElementById('registerStudentForm')?.parentElement;
            const existingForm = document.getElementById('existing-student-form');
            
            if (tab === 'new') {
                if (newForm) newForm.style.display = 'block';
                if (existingForm) existingForm.style.display = 'none';
            } else {
                if (newForm) newForm.style.display = 'none';
                if (existingForm) existingForm.style.display = 'block';

        async function registerStudent(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // Get selected course IDs
            const courseIds = Array.from(e.target.querySelectorAll('input[name="course_ids"]:checked')).map(cb => parseInt(cb.value));
            
                if (courseIds.length === 0) {
                    alert('Please select at least one learning area');
                    return;
                }
            
            try {
                const result = await apiCall('/student-registration', {
                    method: 'POST',
                    body: JSON.stringify({
                        ...data,
                        course_ids: courseIds
                    })
                });
                
                alert(`Student registered successfully! Enrolled in ${result.courses_enrolled} learning area(s).`);
                e.target.reset();
            } catch (error) {
                alert('Error registering student: ' + error.message);
            }
        }

        let studentSearchTimeout;
        async function searchStudents() {
            clearTimeout(studentSearchTimeout);
            const searchTerm = document.getElementById('student-search').value;
            
            if (searchTerm.length < 2) {
                document.getElementById('student-results').innerHTML = '';
                return;
            }
            
            studentSearchTimeout = setTimeout(async () => {
                try {
                    const students = await apiCall(`/student-registration/students?search=${encodeURIComponent(searchTerm)}`);
                    const resultsDiv = document.getElementById('student-results');
                    
                    if (students.length === 0) {
                        resultsDiv.innerHTML = '<p>No students found</p>';
                        return;
                    }
                    
                    resultsDiv.innerHTML = `

        function generatePageNumbers(currentPage, totalPages) {
            const pages = [];
            const maxVisible = 5;
            
            if (totalPages <= maxVisible) {
                for (let i = 1; i <= totalPages; i++) {
                    pages.push(i);
                }
            } else {
                if (currentPage <= 3) {
                    for (let i = 1; i <= 4; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(totalPages);
                } else if (currentPage >= totalPages - 2) {
                    pages.push(1);
                    pages.push('...');
                    for (let i = totalPages - 3; i <= totalPages; i++) {
                        pages.push(i);
                    }
                } else {
                    pages.push(1);
                    pages.push('...');
                    for (let i = currentPage - 1; i <= currentPage + 1; i++) {
                        pages.push(i);
                    }
                    pages.push('...');
                    pages.push(totalPages);
                }
            }
            
            return pages;
        }

                const { strands, learningArea } = substrandData;
                
                const content = document.getElementById('dashboardContent');
                content.innerHTML = `
                    <div class="view-header">
                        <button onclick="loadManageSubstrands()" class="btn-back">← Back to Learning Areas</button>
                        <h2>${learningAreaName} - Sub-strands</h2>
                        <button onclick="showAddSubstrandToLearningArea(${learningAreaId}, '${learningAreaName.replace(/'/g, "\\'")}')" class="btn-primary">Add Sub-strand</button>
                    </div>
                    
                    <div style="margin-top: 2rem;">
                        ${!strands || strands.length === 0 ? `
                            <div class="empty-state">
                                <div class="empty-state-icon">📚</div>
                                <h4>No Strands Found</h4>
                                <p>This learning area doesn't have any strands configured yet.</p>
                                <button onclick="showAddSubstrandToLearningArea(${learningAreaId}, '${learningAreaName.replace(/'/g, "\\'")}')" class="btn-primary" style="margin-top: 1rem;">Add First Sub-strand</button>
                            </div>
                        ` : strands.map((strand, strandIndex) => {
                            const substrands = strand.sub_strands || [];
                            return `
                                <div class="strand-section" style="margin-bottom: 2rem; border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; background: white;">
                                    <div class="strand-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 2px solid #4CAF50;">
                                        <div>
                                            <h3 style="margin: 0; color: #333;">${strand.strand_name || `Strand ${strandIndex + 1}`}</h3>
                                            ${strand.strand_code ? `<span style="color: #666; font-size: 0.9rem;">Code: ${strand.strand_code}</span>` : ''}
                                        </div>
                                        <button onclick="showAddSubstrandToLearningArea(${learningAreaId}, '${learningAreaName.replace(/'/g, "\\'")}', '${strand.strand_code}')" 
                                                class="btn-primary btn-small">
                                            + Add Sub-strand
                                        </button>
                                    </div>
                                    
                                    <div class="substrands-list">
                                        ${substrands.length === 0 ? `
                                            <div style="text-align: center; padding: 2rem; color: #999;">
                                                <p>No sub-strands in this strand yet.</p>
                                            </div>
                                        ` : substrands.map((substrand, subIndex) => `
                                            <div class="substrand-item" style="padding: 1rem; margin-bottom: 0.75rem; background: #f9f9f9; border-radius: 4px; border-left: 4px solid #2196F3;">
                                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                                    <div style="flex: 1;">
                                                        <h4 style="margin: 0 0 0.5rem 0; color: #333;">
                                                            ${substrand.sub_strand_name || 'Unnamed Sub-strand'}
                                                        </h4>
                                                        ${substrand.sub_strand_code ? `<span style="color: #666; font-size: 0.85rem;">Code: ${substrand.sub_strand_code}</span>` : ''}
                                                        ${substrand.indicators && substrand.indicators.length > 0 ? `
                                                            <div style="margin-top: 0.5rem;">
                                                                <strong style="font-size: 0.85rem; color: #666;">Indicators:</strong>
                                                                <ul style="margin: 0.25rem 0 0 1.5rem; font-size: 0.85rem; color: #666;">
                                                                    ${substrand.indicators.slice(0, 3).map(ind => `<li>${ind.indicator_name || ind.indicator_code || 'Indicator'}</li>`).join('')}
                                                                    ${substrand.indicators.length > 3 ? `<li style="color: #999;">... and ${substrand.indicators.length - 3} more</li>` : ''}
                                                                </ul>
                                                            </div>
                                                        ` : ''}
                                                    </div>
                                                    <div style="display: flex; gap: 0.5rem;">
                                                        <button onclick="editSubstrand(${learningAreaId}, '${strand.strand_code}', '${substrand.sub_strand_code}', '${learningAreaName.replace(/'/g, "\\'")}')" 
                                                                class="btn-secondary btn-small">Edit</button>
                                                        <button onclick="deleteSubstrand(${learningAreaId}, '${strand.strand_code}', '${substrand.sub_strand_code}', '${learningAreaName.replace(/'/g, "\\'")}')" 
                                                                class="btn-danger btn-small">Delete</button>
                                                    </div>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading learning area substrands:', error);
                alert('Error: ' + (error.message || 'Failed to load sub-strands'));
            }
        }
        
        function showAddSubstrandToLearningArea(learningAreaId, learningAreaName, preselectedStrandCode = null) {
            // Reuse the existing createSubstrand function but pass learning area ID directly
            // We need to get the strands first
            apiCall(`/substrands/learning-area/${learningAreaId}`)
                .then(data => {
                    const { strands, learningArea } = data;
                    if (!strands || strands.length === 0) {
                        alert('No strands found for this learning area. Please contact administrator to set up the curriculum structure.');
                        return;
                    }
                    
                    // Find a course linked to this learning area to use for the form
                    // For now, we'll use a dummy courseId (0) and handle it in the save function
                    showCreateSubstrandForm(0, learningAreaId, strands, learningArea, preselectedStrandCode);
                })
                .catch(error => {
                    console.error('Error loading strands:', error);
                    alert('Error: ' + (error.message || 'Failed to load strands'));
                });
        }
        
        async function editSubstrand(learningAreaId, strandCode, subStrandCode, learningAreaName) {
            try {
                const substrandData = await apiCall(`/substrands/learning-area/${learningAreaId}`);
                const { strands } = substrandData;
                
                const strand = strands.find(s => s.strand_code === strandCode);
                if (!strand) {
                    alert('Strand not found');
                    return;
                }
                
                const substrand = strand.sub_strands?.find(ss => ss.sub_strand_code === subStrandCode);
                if (!substrand) {
                    alert('Sub-strand not found');
                    return;
                }
                
                // Show edit modal (reuse create form but pre-fill)
                const modal = document.createElement('div');
                modal.id = 'edit-substrand-modal';
                modal.className = 'modal-overlay';
                modal.onclick = function(e) {
                    if (e.target === modal) {
                        closeEditSubstrandModal();
                    }
                };
                
                modal.innerHTML = `
                    <div class="modal-content modal-large">
                        <div class="modal-header">
                            <h2>Edit Sub-strand - ${learningAreaName}</h2>
                            <button onclick="closeEditSubstrandModal()" class="modal-close">&times;</button>
                        </div>
                        <div class="modal-body">
                            <form id="edit-substrand-form" onsubmit="saveEditedSubstrand(event, ${learningAreaId}, '${strandCode}', '${subStrandCode}')">
                                <div class="form-group">
                                    <label>Sub-strand Code *</label>
                                    <input type="text" name="sub_strand_code" value="${substrand.sub_strand_code || ''}" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>Sub-strand Name *</label>
                                    <input type="text" name="sub_strand_name" value="${substrand.sub_strand_name || ''}" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>Learning Indicators</label>
                                    <div id="edit-indicators-container">
                                        ${(substrand.indicators || []).map(ind => `
                                            <div class="indicator-item-input" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                                <input type="text" class="indicator-code-input" value="${ind.indicator_code || ''}" placeholder="Code" style="width: 120px;">
                                                <input type="text" class="indicator-name-input" value="${ind.indicator_name || ''}" placeholder="Indicator description" style="flex: 1;">
                                                <button type="button" onclick="removeIndicator(this)" class="btn-danger btn-small">Remove</button>
                                            </div>
                                        `).join('')}
                                        ${(!substrand.indicators || substrand.indicators.length === 0) ? `
                                            <div class="indicator-item-input" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                                                <input type="text" class="indicator-code-input" placeholder="Code (e.g., IND1.1.1)" style="width: 120px;">
                                                <input type="text" class="indicator-name-input" placeholder="Indicator description" style="flex: 1;">
                                                <button type="button" onclick="removeIndicator(this)" class="btn-danger btn-small">Remove</button>
                                            </div>
                                        ` : ''}
                                    </div>
                                    <button type="button" onclick="addIndicatorInputEdit()" class="btn-secondary" style="margin-top: 0.5rem;">+ Add Indicator</button>
                                </div>
                                
                                <div class="form-actions">
                                    <button type="submit" class="btn-primary">Save Changes</button>
                                    <button type="button" onclick="closeEditSubstrandModal()" class="btn-secondary">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                `;
                
                document.body.appendChild(modal);
                modal.style.display = 'flex';
                setTimeout(() => modal.classList.add('show'), 10);
            } catch (error) {
                console.error('Error loading substrand for edit:', error);
                alert('Error: ' + (error.message || 'Failed to load sub-strand'));
            }
        }
        
        function addIndicatorInputEdit() {
            const container = document.getElementById('edit-indicators-container');
            const newInput = document.createElement('div');
            newInput.className = 'indicator-item-input';
            newInput.style.cssText = 'display: flex; gap: 0.5rem; margin-bottom: 0.5rem; align-items: center;';
            newInput.innerHTML = `
                <input type="text" class="indicator-code-input" placeholder="Code (e.g., IND1.1.1)" style="width: 120px;">
                <input type="text" class="indicator-name-input" placeholder="Indicator description" style="flex: 1;">
                <button type="button" onclick="removeIndicator(this)" class="btn-danger btn-small">Remove</button>
            `;
            container.appendChild(newInput);
        }
        
        async function saveEditedSubstrand(e, learningAreaId, strandCode, subStrandCode) {
            e.preventDefault();
            
            const form = e.target;
            const subStrandName = form.sub_strand_name.value;
            
            // Collect indicators
            const indicators = [];
            document.querySelectorAll('#edit-substrand-modal .indicator-item-input').forEach(item => {
                const code = item.querySelector('.indicator-code-input').value;
                const name = item.querySelector('.indicator-name-input').value;
                if (code && name) {
                    indicators.push({
                        indicator_code: code,
                        indicator_name: name
                    });
                }
            });
            
            try {
                await apiCall(`/substrands/learning-area/${learningAreaId}/strand/${strandCode}/substrand/${subStrandCode}`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        sub_strand_name: subStrandName,
                        indicators: indicators
                    })
                });
                
                alert('Sub-strand updated successfully!');
                closeEditSubstrandModal();
                viewLearningAreaSubstrands(learningAreaId, 'Learning Area');
            } catch (error) {
                console.error('Error updating sub-strand:', error);
                alert('Error: ' + (error.message || 'Failed to update sub-strand'));
            }
        }
        
        function closeEditSubstrandModal() {
            const modal = document.getElementById('edit-substrand-modal');
            if (modal) {
                modal.classList.remove('show');
                setTimeout(() => modal.remove(), 300);
            }
        }
        
        async function deleteSubstrand(learningAreaId, strandCode, subStrandCode, learningAreaName) {
            if (!confirm(`Are you sure you want to delete this sub-strand? This action cannot be undone.`)) {
                return;
            }
            
            try {
                await apiCall(`/substrands/learning-area/${learningAreaId}/strand/${strandCode}/substrand/${subStrandCode}`, {
                    method: 'DELETE'
                });
                
                alert('Sub-strand deleted successfully!');
                viewLearningAreaSubstrands(learningAreaId, learningAreaName);
            } catch (error) {
                console.error('Error deleting sub-strand:', error);
                alert('Error: ' + (error.message || 'Failed to delete sub-strand'));
            }
        }

        // Parent: Load children
        async function loadChildren() {
            const children = await apiCall(`/users/parent/${currentUser.id}/students`);
            const content = document.getElementById('dashboardContent');
            
            if (children.length === 0) {
                content.innerHTML = `
                    <div class="view-header">
                        <h2>My Children</h2>
                    </div>
                    <div class="welcome-message">
                        <p>No children linked to your account.</p>
                    </div>
                `;
                return;
            }
            
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Children</h2>
                </div>
                <div class="children-list">
                    ${children.map(child => `
                        <div class="child-card">
                            <h3>${child.first_name} ${child.last_name}</h3>
                            <p>Email: ${child.email}</p>
                            <button onclick="viewChildProgress(${child.id})" class="btn-view">View Progress</button>
                        </div>
                    `).join('')}

        async function viewChildProgress(studentId) {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="loadView('children')" class="btn-back">← Back to My Children</button>
                    <h2>Child's Progress</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <button onclick="viewChildCourse(${course.id}, ${studentId})" class="btn-view">View Details</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewChildCourse(courseId, studentId) {
            const [grades, attendance] = await Promise.all([
                apiCall(`/grades/course/${courseId}/student/${studentId}/summary`),
                apiCall(`/attendance/course/${courseId}?student_id=${studentId}`)
            ]);
            
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <button onclick="viewChildProgress(${studentId})" class="btn-back">← Back</button>
                    <h2>Learning Area Details</h2>
                </div>
                <div class="child-details">
                    <h3>Grades</h3>
                    <p>Current Average: ${grades.currentAverage}%</p>
                    <p>Final Grade: ${grades.finalGrade ? grades.finalGrade.letter_grade : 'N/A'}</p>
                    <h3>Attendance</h3>
                    <p>Total Records: ${attendance.length}</p>
                </div>
            `;
        }

        function formatRoleName(role) {
            const roleNames = {
                'superadmin': 'Administrator',
                'headteacher': 'Head of Institution',
                'deputy_headteacher': 'Deputy Headteacher',
                'teacher': 'Teacher',
                'student': 'Learner',
                'parent': 'Parent',
                'finance': 'Finance Administrator'
            };
            return roleNames[role] || role.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase());
        }

        function toggleUserMenu() {
            const dropdown = document.getElementById('userMenuDropdown');
            if (dropdown) {
                dropdown.classList.toggle('show');
            }
        }

        // Close user menu when clicking outside
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('userProfileMenu');
            const dropdown = document.getElementById('userMenuDropdown');
            if (menu && dropdown && !menu.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });

        async function loadProfile() {
            try {

                const content = document.getElementById('dashboardContent');
                content.innerHTML = `

                        <button onclick="loadView('dashboard')" class="btn-back">← Back to Dashboard</button>
                        <h2>My Profile</h2>
                    </div>
                    <div class="profile-container">
                        <div class="profile-card">
                            <div class="profile-header">
                                <div class="profile-avatar-large">${user.first_name.charAt(0)}${user.last_name.charAt(0)}</div>
                                <div class="profile-info">
                                    <h3>${user.first_name} ${user.last_name}</h3>
                                    <p class="profile-email">${user.email}</p>
                                    <span class="role-badge role-${user.role}">${formatRoleName(user.role)}</span>
                                </div>
                            </div>
                            <div class="profile-details">
                                <div class="detail-row">
                                    <span class="detail-label">Username:</span>

                                </div>
                                <div class="detail-row">
                                    <span class="detail-label">Email:</span>
                                    <span class="detail-value">${user.email}</span>

                                    <span class="detail-label">Role:</span>

                                <div class="detail-row">
                                    <span class="detail-label">Phone:</span>
                                    <span class="detail-value">${user.phone}</span>
                                </div>

        async function loadProfileSettings() {
            try {

                const content = document.getElementById('dashboardContent');
                content.innerHTML = `

                        <button onclick="loadView('profile')" class="btn-back">← Back to Profile</button>
                        <h2>Profile Settings</h2>
                    </div>
                    <div class="form-container">
                        <form id="profileSettingsForm" onsubmit="updateProfile(event)">

                                <input type="text" name="last_name" value="${user.last_name || ''}" required>

        async function updateProfile(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                await apiCall(`/users/${currentUser.id}`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                alert('Profile updated successfully!');
                loadProfile();
            } catch (error) {
                alert('Error updating profile: ' + error.message);
            }
        }

            if (userMenu) {
                userMenu.style.display = 'none';

            // Show grade selection screen
            await showGradeSelection();

            localStorage.removeItem('authToken');
            localStorage.removeItem('currentGrade');
            authToken = null;
