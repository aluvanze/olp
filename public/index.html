<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senior School OLP - Online Learner Progress Monitor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div id="root">
        <div class="login-container">
            <div class="login-left-panel">
                <div class="login-branding">
                    <h1 class="brand-title">Senior School OLP</h1>
                    <h2 class="brand-subtitle">Online Learner Progress Monitor</h2>
                    <p class="brand-tagline">Unlocking Academic Gates For Future Excellence</p>
                    <p class="brand-description">Competency-Based Curriculum (CBC) Senior School Management Platform for Grades 10-12. Designed for Kenya's education system.</p>
                </div>
            </div>
            <div class="login-right-panel">
                <div class="login-form-container">
                    <h2 class="login-title">Sign In</h2>
                    <p class="login-subtitle">Enter your credentials to access your account</p>

                <form id="loginForm">
                    <div class="form-group">
                            <label for="username">
                                <span class="input-icon">✉️</span>
                                Email Address
                            </label>
                            <input type="text" id="username" name="username" placeholder="your.email@school.com" required>
                    </div>
                    <div class="form-group">
                            <label for="password">
                                <span class="input-icon">🔒</span>
                                Password
                            </label>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-primary">
                            <span>Sign In</span>
                            <span class="btn-loader" style="display: none;">⏳</span>
                        </button>
                    <div id="loginError" class="error-message"></div>
                </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use relative URL for production - works with any domain
        const API_BASE_URL = '/api';
        let currentUser = null;
        let authToken = null;
        let currentGrade = null;
        
        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            const grade = localStorage.getItem('currentGrade');
            if (token) {
                authToken = token;
                if (grade) {
                    currentGrade = JSON.parse(grade);
                }
                checkAuth();
            }
        });

        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE_URL}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                if (response.ok) {
                    const userData = await response.json();
                    currentUser = userData;
                    
                    // Check if grade is selected (from token or user data)
                    if (userData.current_grade) {
                        currentGrade = userData.current_grade;
                        localStorage.setItem('currentGrade', JSON.stringify(currentGrade));
                        showDashboard();
                    } else {
                        // Need to select grade
                        showGradeSelection();
                    }
                } else {
                    localStorage.removeItem('authToken');
                    localStorage.removeItem('currentGrade');
                    authToken = null;
                    currentGrade = null;
                }
            } catch (error) {
                console.error('Auth check error:', error);
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    authToken = data.token;
                    currentUser = data.user;
                    localStorage.setItem('authToken', authToken);
                    errorDiv.textContent = '';
                    
                    // Debug logging
                    console.log('Login response:', {
                        requires_grade_selection: data.requires_grade_selection,
                        grades_count: data.available_grades ? data.available_grades.length : 0,
                        grades: data.available_grades
                    });
                    
                    // Check if grade selection is required
                    if (data.requires_grade_selection && data.available_grades && data.available_grades.length > 0) {
                        console.log('Showing grade selection screen');
                        // Show grade selection screen
                        showGradeSelection(data.available_grades);
                    } else {
                        console.log('Proceeding to dashboard (no grade selection needed)');
                        // Grade already selected or not required, proceed to dashboard
                        showDashboard();
                    }
                } else {
                    errorDiv.textContent = data.message || 'Login failed';
                    console.error('Login error:', data);
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please check if the server is running.';
                console.error('Login error:', error);
                console.error('Error details:', error.message);
            }
        });

        // Show grade selection screen
        async function showGradeSelection(availableGrades = null) {
            const root = document.getElementById('root');
            
            // Check if user is already logged in (switching grades)
            const isSwitching = currentUser !== null && authToken !== null;
            
            // If grades not provided, fetch them
            if (!availableGrades) {
                try {
                    const response = await fetch(`${API_BASE_URL}/auth/grades`, {
                        headers: {
                            'Authorization': `Bearer ${authToken}`
                        }
                    });
                    if (response.ok) {
                        availableGrades = await response.json();
                    } else {
                        console.error('Failed to fetch grades');
                        return;
                    }
                } catch (error) {
                    console.error('Error fetching grades:', error);
                    return;
                }
            }
            
            root.innerHTML = `
                <div class="login-container">
                    <div class="login-left-panel">
                        <div class="login-branding">
                            <h1 class="brand-title">Senior School OLP</h1>
                            <h2 class="brand-subtitle">Online Learner Progress Monitor</h2>
                            <p class="brand-tagline">Unlocking Academic Gates For Future Excellence</p>
                            <p class="brand-description">${isSwitching ? 'Switch to a different grade' : 'Select your grade to continue'}</p>
                        </div>
                    </div>
                    <div class="login-right-panel">
                        <div class="login-form-container">
                            <h2 class="login-title">${isSwitching ? 'Switch Grade' : 'Select Grade'}</h2>
                            <p class="login-subtitle">Choose the grade you want to access</p>
                            
                            ${currentGrade ? `<p style="text-align: center; color: #666; margin-bottom: 1rem; padding: 0.5rem; background: #f0f0f0; border-radius: 4px;">Current: <strong>${currentGrade.name}</strong></p>` : ''}
                            
                            <div id="gradeSelectionError" class="error-message" style="display: none;"></div>
                            
                            <div class="grade-selection-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 2rem 0;">
                                ${availableGrades.map(grade => `
                                    <div class="grade-card" onclick="selectGrade(${grade.id})" style="
                                        border: 2px solid ${currentGrade && currentGrade.id === grade.id ? '#4CAF50' : '#e0e0e0'};
                                        border-radius: 8px;
                                        padding: 1.5rem;
                                        text-align: center;
                                        cursor: pointer;
                                        transition: all 0.3s ease;
                                        background: ${currentGrade && currentGrade.id === grade.id ? '#f0f8f0' : 'white'};
                                        position: relative;
                                    " onmouseover="this.style.borderColor='#4CAF50'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 8px rgba(0,0,0,0.1)'" 
                                    onmouseout="this.style.borderColor='${currentGrade && currentGrade.id === grade.id ? '#4CAF50' : '#e0e0e0'}'; this.style.transform='translateY(0)'; this.style.boxShadow='none'">
                                        ${currentGrade && currentGrade.id === grade.id ? `<div style="position: absolute; top: 0.5rem; right: 0.5rem; background: #4CAF50; color: white; padding: 0.25rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: bold;">Current</div>` : ''}
                                        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">📚</div>
                                        <h3 style="margin: 0.5rem 0; color: #333; font-size: 1.5rem;">${grade.name}</h3>
                                        ${grade.description ? `<p style="margin: 0; color: #666; font-size: 0.9rem;">${grade.description}</p>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                            
                            <div style="text-align: center; margin-top: 2rem;">
                                ${isSwitching ? `
                                    <button onclick="showDashboard()" class="btn-secondary" style="
                                        background: #f5f5f5;
                                        color: #333;
                                        border: 1px solid #ddd;
                                        padding: 0.75rem 1.5rem;
                                        border-radius: 4px;
                                        cursor: pointer;
                                        margin-right: 1rem;
                                    ">Cancel</button>
                                ` : ''}
                                <button onclick="logout()" class="btn-secondary" style="
                                    background: #f5f5f5;
                                    color: #333;
                                    border: 1px solid #ddd;
                                    padding: 0.75rem 1.5rem;
                                    border-radius: 4px;
                                    cursor: pointer;
                                ">${isSwitching ? 'Sign Out' : 'Back to Login'}</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Select grade and proceed
        async function selectGrade(gradeId) {
            const errorDiv = document.getElementById('gradeSelectionError');
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/select-grade`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ grade_id: gradeId })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Update token with grade information
                    authToken = data.token;
                    currentGrade = data.grade;
                    localStorage.setItem('authToken', authToken);
                    localStorage.setItem('currentGrade', JSON.stringify(currentGrade));
                    
                    // Proceed to dashboard (which will show term selection)
                    showDashboard();
                } else {
                    if (errorDiv) {
                        errorDiv.style.display = 'block';
                        errorDiv.textContent = data.message || 'Failed to select grade';
                    }
                    console.error('Grade selection error:', data);
                }
            } catch (error) {
                if (errorDiv) {
                    errorDiv.style.display = 'block';
                    errorDiv.textContent = 'Connection error. Please try again.';
                }
                console.error('Grade selection error:', error);
            }
        }

        function showDashboard() {
            const root = document.getElementById('root');
            const role = currentUser.role;
            
            // Role-specific navigation
            let navButtons = '';
            
            if (role === 'student') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn active">Dashboard</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'teacher') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn active">Dashboard</button>
                    <button onclick="loadView('manage-substrands')" class="nav-btn">Manage Sub-strands</button>
                    <button onclick="loadView('register-student')" class="nav-btn">Register Student</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'headteacher' || role === 'deputy_headteacher' || role === 'superadmin' || role === 'finance') {
                navButtons = `
                    <button onclick="loadView('dashboard')" class="nav-btn active">Dashboard</button>
                    ${role === 'headteacher' || role === 'superadmin' || role === 'deputy_headteacher' ? `<button onclick="loadView('admin-dashboard')" class="nav-btn">System Overview</button>` : ''}
                    <button onclick="loadView('manage-substrands')" class="nav-btn">Manage Sub-strands</button>
                    <button onclick="loadView('register-student')" class="nav-btn">Register Student</button>
                    ${role === 'superadmin' || role === 'headteacher' ? `<button onclick="loadView('manage-terms')" class="nav-btn">Manage Terms</button>` : ''}
                    ${role === 'superadmin' ? `<button onclick="loadView('users')" class="nav-btn">User Management</button>` : ''}
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else if (role === 'parent') {
                navButtons = `
                    <button onclick="loadView('children')" class="nav-btn">My Children</button>
                    <button onclick="loadView('grades')" class="nav-btn">Grades</button>
                    <button onclick="loadView('attendance')" class="nav-btn">Attendance</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            } else {
                navButtons = `
                    <button onclick="loadView('courses')" class="nav-btn">Learning Areas</button>
                    <button onclick="loadView('messages')" class="nav-btn">Messages</button>
                `;
            }
            
            root.innerHTML = `
                <div class="dashboard">
                    <header class="dashboard-header">
                        <div class="header-content">
                            <div class="header-left">
                                <div class="system-logo-small">
                                    <span class="logo-text">Senior School OLP</span>
                            </div>
                                <nav class="main-nav">
                        ${navButtons}
                    </nav>
                            </div>
                            <div class="header-right">
                                ${currentGrade ? `
                                    <div onclick="switchGrade()" style="margin-right: 1rem; padding: 0.5rem 1rem; background: #4CAF50; color: white; border-radius: 4px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: all 0.2s ease;" 
                                         onmouseover="this.style.background='#45a049'; this.style.transform='scale(1.05)'" 
                                         onmouseout="this.style.background='#4CAF50'; this.style.transform='scale(1)'"
                                         title="Click to switch grade">
                                        <span>${currentGrade.name}</span>
                                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="opacity: 0.9;">
                                            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </div>
                                ` : ''}
                                <div class="user-profile-menu" id="userProfileMenu">
                                    <button class="user-profile-btn" onclick="toggleUserMenu()">
                                        <div class="user-avatar">${currentUser.first_name.charAt(0)}${currentUser.last_name.charAt(0)}</div>
                                        <div class="user-info">
                                            <span class="user-name">${currentUser.first_name} ${currentUser.last_name}</span>
                                            <span class="user-role">${formatRoleName(role)}</span>
                                        </div>
                                        <svg class="dropdown-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
                                            <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </button>
                                    <div class="user-menu-dropdown" id="userMenuDropdown">
                                        <div class="dropdown-header">
                                            <div class="user-avatar-large">${currentUser.first_name.charAt(0)}${currentUser.last_name.charAt(0)}</div>
                                            <div>
                                                <div class="user-name-large">${currentUser.first_name} ${currentUser.last_name}</div>
                                                <div class="user-email">${currentUser.email}</div>
                                                <div class="user-role-badge">${formatRoleName(role)}</div>
                                            </div>
                                        </div>
                                        <div class="dropdown-divider"></div>
                                        <a href="#" class="dropdown-item" onclick="loadView('profile'); toggleUserMenu(); return false;">
                                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 8C10.2091 8 12 6.20914 12 4C12 1.79086 10.2091 0 8 0C5.79086 0 4 1.79086 4 4C4 6.20914 5.79086 8 8 8Z" fill="currentColor"/><path d="M0 14C0 11.2386 2.23858 9 5 9H11C13.7614 9 16 11.2386 16 14V16H0V14Z" fill="currentColor"/></svg>
                                            <span>My Profile</span>
                                        </a>
                                        <a href="#" class="dropdown-item" onclick="loadView('profile-settings'); toggleUserMenu(); return false;">
                                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" fill="currentColor"/><path d="M13.6569 6.34315L12.2426 4.92893C12.0521 4.73841 11.8357 4.58579 11.6036 4.46447L10.5858 3.41421C10.2107 3.03914 9.70201 2.82843 9.17157 2.82843H6.82843C6.29799 2.82843 5.78929 3.03914 5.41421 3.41421L4.39645 4.46447C4.16435 4.58579 3.94786 4.73841 3.75736 4.92893L2.34315 6.34315C1.95262 6.73367 1.95262 7.36684 2.34315 7.75736L3.75736 9.17157C3.94786 9.36209 4.16435 9.51471 4.39645 9.63503L5.41421 10.6853C5.78929 11.0604 6.29799 11.2711 6.82843 11.2711H9.17157C9.70201 11.2711 10.2107 11.0604 10.5858 10.6853L11.6036 9.63503C11.8357 9.51471 12.0521 9.36209 12.2426 9.17157L13.6569 7.75736C14.0474 7.36684 14.0474 6.73367 13.6569 6.34315Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                            <span>Profile Settings</span>
                                        </a>
                                        <a href="#" class="dropdown-item" onclick="switchGrade(); toggleUserMenu(); return false;">
                                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2L2 8L8 14M14 2L8 8L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                            <span>Switch Grade</span>
                                        </a>
                                        <a href="#" class="dropdown-item" onclick="logout(); return false;">
                                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 14H3C2.46957 14 1.96086 13.7893 1.58579 13.4142C1.21071 13.0391 1 12.5304 1 12V4C1 3.46957 1.21071 2.96086 1.58579 2.58579C1.96086 2.21071 2.46957 2 3 2H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 11L15 8L11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                            <span>Sign Out</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>
                    <main class="dashboard-content" id="dashboardContent">
                        <div class="welcome-message">
                            <h2>Welcome, ${currentUser.first_name}!</h2>
                            <p>Loading your dashboard...</p>
                        </div>
                    </main>
                </div>
            `;
            
            // Automatically load the dashboard (terms view) after showing the layout
            setTimeout(() => {
                loadView('dashboard');
            }, 100);
        }

        async function loadView(viewName) {
            const content = document.getElementById('dashboardContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            // Update active navigation button
            document.querySelectorAll('.main-nav .nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes(`'${viewName}'`)) {
                    btn.classList.add('active');
                }
            });

            try {
                switch(viewName) {
                    // Student views
                    case 'dashboard':
                        await loadDashboard();
                        break;
                    case 'term-courses':
                        await loadTermCourses();
                        break;
                    case 'courses':
                        await loadCourses();
                        break;
                    case 'modules':
                        await loadModules();
                        break;
                    case 'assignments':
                        await loadAssignments();
                        break;
                    case 'grades':
                        await loadGrades();
                        break;
                    case 'attendance':
                        await loadAttendance();
                        break;
                    case 'messages':
                        await loadMessages();
                        break;
                    case 'profile':
                        await loadProfile();
                        break;
                    case 'profile-settings':
                        await loadProfileSettings();
                        break;
                    
                    // Teacher views
                    case 'my-courses':
                        await loadTeacherCourses();
                        break;
                    case 'assign-teachers':
                        await showAssignTeachers();
                        break;
                    case 'pending-enrollments':
                        await loadPendingEnrollments();
                        break;
                    case 'grading-center':
                        await loadGradingCenter();
                        break;
                    
                    // Admin views
                    case 'dashboard':
                        await loadDashboard(); // Per TERM_BASED_NAVIGATION.md, dashboard shows term selection
                        break;
                    case 'admin-dashboard':
                        await loadAdminDashboard(); // Separate view for System Overview per ADMIN_FEATURES.md
                        break;
                    case 'term-courses':
                        await loadTermCourses();
                        break;
                    case 'teachers-overview':
                        await loadTeachersOverview();
                        break;
                    case 'add-teacher':
                        await showAddTeacher();
                        break;
                    case 'allocate-courses':
                        await showAllocateCourses();
                        break;
                    case 'all-courses':
                        await loadAllCourses();
                        break;
                    case 'users':
                        await loadUsers();
                        break;
                    case 'manage-terms':
                        await loadManageTerms();
                        break;
                    case 'register-student':
                        await loadRegisterStudent();
                        break;
                    case 'manage-substrands':
                        await loadManageSubstrands();
                        break;
                    
                    // Parent views
                    case 'children':
                        await loadChildren();
                        break;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Error loading ${viewName}: ${error.message}</div>`;
                console.error('Load view error:', error);
            }
        }

        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    ...options,
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                        ...options.headers
                    }
                });
                
                if (!response.ok) {
                    let errorData;
                    try {
                        errorData = await response.json();
                    } catch (e) {
                        errorData = { message: `HTTP ${response.status}: ${response.statusText}` };
                    }
                    
                    const error = new Error(errorData.message || 'API error');
                    error.status = response.status;
                    error.response = errorData;
                    throw error;
                }
                return await response.json();
            } catch (error) {
                // Suppress console errors for 404s on finance routes (server may need restart)
                const isFinanceRoute = endpoint.includes('/finance/');
                const is404 = error.status === 404;
                
                if (!(isFinanceRoute && is404)) {
                    console.error('API call error:', {
                        endpoint,
                        method: options.method || 'GET',
                        error: error.message,
                        status: error.status,
                        response: error.response
                    });
                }
                throw error;
            }
        }

        async function loadCourses() {
            const courses = await apiCall('/courses');
            const content = document.getElementById('dashboardContent');
            content.innerHTML = `
                <div class="view-header">
                    <h2>My Learning Areas</h2>
                </div>
                <div class="courses-grid">
                    ${courses.map(course => `
                        <div class="course-card">
                            <h3>${course.course_name}</h3>
                            <p><strong>Code:</strong> ${course.course_code}</p>
                            <p>${course.description || ''}</p>
                            <p><strong>Teacher:</strong> ${course.teacher_first_name || ''} ${course.teacher_last_name || ''}</p>
                            <p><strong>Enrolled Students:</strong> ${course.enrolled_students || 0}</p>
                            <button onclick="viewCourse(${course.id})" class="btn-view">View Learning Area</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        async function viewCourse(courseId) {
            try {
                // Get current term and academic year if available, otherwise use defaults
                let termFilter = '';
                if (currentTerm && currentAcademicYear) {
                    termFilter = `?term=${currentTerm}&academic_year=${currentAcademicYear}`;
                }
                
                const [course, modules, assignments] = await Promise.all([
                    apiCall(`/courses/${courseId}`),
                    apiCall(`/modules/course/${courseId}${termFilter}`),
                    apiCall(`/assignments/course/${courseId}`)
                ]);
                
                // Get attendance data if available
                let attendance = [];
                let attendanceStats = null;
                try {
                    attendance = await apiCall(`/attendance/course/${courseId}`);
                    // Calculate attendance stats
                    if (attendance.length > 0) {
                        const present = attendance.filter(a => a.status === 'Present').length;
                        const total = attendance.length;
                        attendanceStats = {
                            present,
                            total,
                            percentage: Math.round((present / total) * 100)
                        };
                    }
                } catch (e) {
                    // Attendance not available, continue without it
                }
                
                // Get enrolled students count
                let enrolledStudents = [];
                try {
                    enrolledStudents = await apiCall(`/courses/${courseId}/enrollments`);
                } catch (e) {
                    // Enrollments not available
                }
            
            const content = document.getElementById('dashboardContent');
                const role = currentUser.role;
                const isReadOnly = ['finance', 'parent', 'student'].includes(role);

                let termName = '';
                if (currentTerm && currentAcademicYear) {
                    const currentYear = new Date().getFullYear();
                    const termNames = {
                        1: `Term 1 ${currentYear} (January - April)`,
                        2: `Term 2 ${currentYear} (April - July)`,
                        3: `Term 3 ${currentYear} (August - October)`
                    };

                                <div class="course-title-group">
                                    <h1 class="course-title">${course.course_name}</h1>
                                    ${course.course_code ? `<span class="course-code-badge">${course.course_code}</span>` : ''}
                                    ${termName ? `<p class="course-term">${termName}</p>` : ''}
                </div>
                            </div>
                            <div class="course-header-right">
                                ${course.description ? `<p class="course-description">${course.description}</p>` : ''}
                            </div>
                        </div>
                    </div>

                    <!-- Course Stats Bar -->
                    <div class="course-stats-bar">
                        ${enrolledStudents.length > 0 ? `
                            <div class="course-stat-item">
                                <span class="stat-icon">👥</span>
                                <div class="stat-info">
                                    <span class="stat-value">${enrolledStudents.length}</span>
                                    <span class="stat-label">Enrolled Students</span>
                                </div>
                            </div>
                        ` : ''}
                        <div class="course-stat-item">
                            <span class="stat-icon">📚</span>
                            <div class="stat-info">
                                <span class="stat-value">${modules.length}</span>
                                <span class="stat-label">Learning Modules</span>
                            </div>
                        </div>
                        <div class="course-stat-item">
                            <span class="stat-icon">📝</span>
                            <div class="stat-info">
                                <span class="stat-value">${assignments.length}</span>
                                <span class="stat-label">Assignments</span>
                            </div>
                        </div>
                        ${attendanceStats ? `
                            <div class="course-stat-item">
                                <span class="stat-icon">✓</span>
                                <div class="stat-info">
                                    <span class="stat-value">${attendanceStats.percentage}%</span>
                                    <span class="stat-label">Attendance Rate</span>
                                </div>
                            </div>

                    </div>

                    <!-- Course Tabs -->
                    <div class="course-tabs">
                        <button onclick="showCourseViewTab('modules')" class="tab-btn active" id="tab-view-modules">Learning Modules</button>
                        <button onclick="showCourseViewTab('curriculum')" class="tab-btn" id="tab-view-curriculum">Curriculum</button>
                        <button onclick="showCourseViewTab('assignments')" class="tab-btn" id="tab-view-assignments">Assignments</button>
                        ${attendance.length > 0 || !isReadOnly ? `<button onclick="showCourseViewTab('attendance')" class="tab-btn" id="tab-view-attendance">Attendance</button>` : ''}
                        ${!isReadOnly ? `<button onclick="showCourseViewTab('grades')" class="tab-btn" id="tab-view-grades">Grading</button>` : ''}
                        ${enrolledStudents.length > 0 ? `<button onclick="showCourseViewTab('students')" class="tab-btn" id="tab-view-students">Students (${enrolledStudents.length})</button>` : ''}
                    </div>
                    
                    <!-- Course Tab Content -->
                    <div id="course-view-tab-content">
                        ${renderCourseViewModules(modules, courseId, isReadOnly)}

        function renderCourseCurriculum(course) {
            const role = currentUser.role;
            const isReadOnly = ['finance', 'parent', 'student'].includes(role);
            const courseId = window.currentCourseViewData?.courseId || course.id;
            
            if (!course.strands || !Array.isArray(course.strands) || course.strands.length === 0) {
                return `
                    <div class="course-section">
                        <div class="section-header">
                            <h3>Curriculum Structure</h3>
                            ${!isReadOnly ? `<button onclick="createSubstrand(${courseId})" class="btn-primary">Create Sub-strand</button>` : ''}
                        </div>
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <h4>No Curriculum Data</h4>
                            <p>Curriculum sub-strands have not been configured for this learning area yet.</p>
                            ${!isReadOnly ? `<p>Click "Create Sub-strand" to add curriculum content.</p>` : ''}
                        </div>
                    </div>
                `;
            }
            
            let html = `
                <div class="course-section">
                    <div class="section-header">
                        <h3>Curriculum Structure</h3>
                        ${!isReadOnly ? `<button onclick="createSubstrand(${courseId})" class="btn-primary">Create Sub-strand</button>` : ''}
                        <p class="section-description">Strands, Sub-strands, and Learning Indicators for ${course.course_name || course.learning_area_name || 'this learning area'}</p>
                    </div>
                    <div class="curriculum-container">
            `;
            
            course.strands.forEach((strand, strandIndex) => {
                html += `
                    <div class="strand-card">
                        <div class="strand-header">
                            <div class="strand-number">${strandIndex + 1}</div>
                            <div class="strand-info">
                                <h4 class="strand-name">${strand.strand_name || 'Unnamed Strand'}</h4>
                                ${strand.strand_code ? `<span class="strand-code">${strand.strand_code}</span>` : ''}
                            </div>
                        </div>
                        <div class="sub-strands-list">
                `;
                
                if (strand.sub_strands && Array.isArray(strand.sub_strands)) {
                    strand.sub_strands.forEach((subStrand, subIndex) => {
                        html += `
                            <div class="sub-strand-item">
                                <div class="sub-strand-header">
                                    <div class="sub-strand-number">${strandIndex + 1}.${subIndex + 1}</div>
                                    <div class="sub-strand-info">
                                        <h5 class="sub-strand-name">${subStrand.sub_strand_name || 'Unnamed Sub-strand'}</h5>
                                        ${subStrand.sub_strand_code ? `<span class="sub-strand-code">${subStrand.sub_strand_code}</span>` : ''}
                                    </div>
                                </div>
                        `;
                        
                        if (subStrand.indicators && Array.isArray(subStrand.indicators) && subStrand.indicators.length > 0) {
                            html += `
                                <div class="indicators-list">
                                    <h6 class="indicators-title">Learning Indicators:</h6>
                                    <ul class="indicators-ul">
                            `;
                            
                            subStrand.indicators.forEach((indicator, indIndex) => {
                                html += `
                                    <li class="indicator-item">
                                        <span class="indicator-code">${indicator.indicator_code || `${strandIndex + 1}.${subIndex + 1}.${indIndex + 1}`}</span>
                                        <span class="indicator-name">${indicator.indicator_name || 'Unnamed Indicator'}</span>
                                    </li>
                                `;
                            });
                            
                            html += `
                                    </ul>
                                </div>
                            `;
                        }
                        
                        html += `
                            </div>
                        `;
                    });
                }
                
                html += `
                        </div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                </div>
            `;
            
            return html;
        }

        async function sendMessage(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                recipient: formData.get('recipient'),
                subject: formData.get('subject'),
                message_body: formData.get('message_body')
            };
            
            try {
                await apiCall('/email/send', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
                alert('Message sent successfully!');
                loadView('messages');
            } catch (error) {
                alert('Error sending message: ' + error.message);
            }
        }

        async function viewMessage(messageId) {
            try {
                const message = await apiCall(`/email/${messageId}`);
                // Mark as read
                try {
                    await apiCall(`/email/${messageId}/read`, { method: 'PUT' });
                } catch (e) {
                    // Ignore if marking as read fails
                }
                
                const content = document.getElementById('dashboardContent');
                content.innerHTML = `
                    <div class="view-header">
                        <button onclick="loadView('messages')" class="btn-back">← Back to Messages</button>

                        <div class="message-view-header">

                            <div class="message-view-actions">

                alert('Error loading message: ' + error.message);
            }
        }

        async function replyToMessage(messageId) {

        async function renderStudentPerformanceView() {
            try {
                // Get courses for the selected term only
                if (!currentTerm || !currentAcademicYear) {
                    return `<div class="error">Please select a term first</div>`;
                }
                
                const courses = await apiCall(`/courses/term/${currentTerm}/${currentAcademicYear}`);
                const allGrades = [];
                const performanceData = {};
                
                // Get term date range for filtering grades by term
                const terms = await apiCall(`/courses/terms?academic_year=${currentAcademicYear.split('-')[0]}`).catch(() => []);
                const selectedTermData = terms.find(t => t.term === currentTerm);
                const termStartDate = selectedTermData?.start_date || null;
                const termEndDate = selectedTermData?.end_date || null;
                
                for (const course of courses) {
                    try {
                        const grades = await apiCall(`/grades/course/${course.id}`);
                        // Filter grades by term date range if available
                        let courseGrades = grades.map(g => ({...g, course_name: course.course_name, course_code: course.course_code}));
                        
                        if (termStartDate && termEndDate) {
                            courseGrades = courseGrades.filter(g => {
                                if (!g.graded_at) return false;
                                const gradeDate = new Date(g.graded_at);
                                const start = new Date(termStartDate);
                                const end = new Date(termEndDate);
                                return gradeDate >= start && gradeDate <= end;
                            });
                        }
                        
                        allGrades.push(...courseGrades);
                        
                        if (courseGrades.length > 0) {
                            const avg = courseGrades.reduce((sum, g) => sum + parseFloat(g.percentage || 0), 0) / courseGrades.length;
                            performanceData[course.course_name] = {
                                average: avg,
                                grades: courseGrades
                            };
                        }
                    } catch (e) {
                        // Skip if no grades
                    }
                }
                
                
                // Prepare chart data
                const courseNames = Object.keys(performanceData);
                const averages = courseNames.map(name => performanceData[name].average);
                
                // Store chart data globally for rendering after DOM update
                window.pendingChartData = {
                    courseNames: courseNames,
                    averages: averages
                };
                
                const html = `
                    <div class="student-performance-view">
                        <div class="performance-charts-section">
                            <h3>Performance Trends</h3>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                                <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 8px;">
                                    <h4 style="margin-top: 0;">Average Performance by Learning Area</h4>
                                    <canvas id="performanceBarChart" style="max-height: 300px;"></canvas>
                                </div>
                                <div style="background: var(--bg-secondary); padding: 1.5rem; border-radius: 8px;">
                                    <h4 style="margin-top: 0;">Performance Over Time</h4>
                                    <canvas id="performanceLineChart" style="max-height: 300px;"></canvas>
                                </div>
                            </div>
                        </div>
                        
                        <div class="assessments-table-section">
                            <h3>All Assessments - Term ${currentTerm}</h3>
                            <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 1rem;">Individual assignment and assessment scores for this term</p>
                            <div style="overflow-x: auto;">
                                <table class="data-table" style="width: 100%;">
                                    <thead>
                                        <tr>
                                            <th>Learning Area</th>
                                            <th>Assessment Type</th>
                                            <th>Title/Description</th>
                                            <th>Score</th>
                                            <th>Grade</th>
                                            <th>Date</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${allGrades.length === 0 ? '<tr><td colspan="6" style="text-align: center; padding: 2rem; color: var(--text-secondary);">No assessments yet for this term</td></tr>' : allGrades.map(grade => `
                                            <tr>
                                                <td>${grade.course_name || grade.course_code}</td>
                                                <td><span style="padding: 0.25rem 0.5rem; border-radius: 4px; background: ${grade.grade_type === 'formative' ? '#e3f2fd' : grade.grade_type === 'summative' ? '#fff3e0' : '#f3e5f5'}; color: ${grade.grade_type === 'formative' ? '#1976d2' : grade.grade_type === 'summative' ? '#f57c00' : '#7b1fa2'};">${grade.grade_type || 'assignment'}</span></td>
                                                <td>${grade.assignment_title || 'Assessment'}</td>
                                                <td>${grade.points_earned || 0} / ${grade.points_possible || 0} (${grade.percentage || 0}%)</td>
                                                <td><strong>${grade.letter_grade || 'N/A'}</strong></td>
                                                <td>${grade.graded_at ? new Date(grade.graded_at).toLocaleDateString() : 'N/A'}</td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
                
                // Render charts after DOM is updated
                setTimeout(() => {
                    renderPerformanceCharts();
                }, 100);
                
                return html;
            } catch (error) {
                return `<div class="error">Error loading performance view: ${error.message}</div>`;
            }
        }

        async function renderStudentResourceCenter() {
            try {
                // Get assignments with attachments (resources) for selected term only
                if (!currentTerm || !currentAcademicYear) {
                    return `<div class="error">Please select a term first</div>`;
                }
                
                const courses = await apiCall(`/courses/term/${currentTerm}/${currentAcademicYear}`);
                const resources = [];
                
                for (const course of courses) {
                    try {
                        const assignments = await apiCall(`/assignments/course/${course.id}`);
                        for (const assignment of assignments) {
                            if (assignment.attachments) {
                                let attachments = [];
                                try {
                                    attachments = typeof assignment.attachments === 'string' 
                                        ? JSON.parse(assignment.attachments) 
                                        : assignment.attachments;
                                } catch (e) {
                                    attachments = [];
                                }
                                
                                if (attachments.length > 0) {
                                    resources.push({
                                        id: assignment.id,
                                        course_id: course.id,
                                        course_name: course.course_name,
                                        course_code: course.course_code,
                                        title: assignment.title,
                                        description: assignment.description,
                                        assignment_type: assignment.assignment_type,
                                        attachments: attachments,
                                        created_at: assignment.created_at
                                    });
                                }
                            }
                        }
                    } catch (e) {
                        // Skip if can't get assignments
                    }
                }
                
                return `

        async function loadPrincipalTermDashboard() {
            const content = document.getElementById('dashboardContent');
            
            if (!currentTerm || !currentAcademicYear) {
                await loadDashboard();
                return;
            }
            
            try {
                // Get term details
                const terms = await apiCall(`/courses/terms?academic_year=${currentAcademicYear.split('-')[0]}`).catch(() => []);
                const selectedTermData = terms.find(t => t.term === currentTerm);
                const termName = selectedTermData ? selectedTermData.name : `Term ${currentTerm}`;
                
                // Get term-specific data
                const courses = await apiCall(`/courses/term/${currentTerm}/${currentAcademicYear}`);
                const adminStats = await apiCall(`/admin/dashboard`).catch(() => null);
                
                // Calculate term-specific statistics
                let totalStudents = 0;
                let totalTeachers = 0;
                let totalAssignments = 0;
                let totalGrades = 0;
                let averageGrade = 0;
                let attendanceRate = 0;
                
                const teacherSet = new Set();
                const studentSet = new Set();
                
                for (const course of courses) {
                    if (course.teacher_id) teacherSet.add(course.teacher_id);
                    if (course.enrolled_students) {
                        totalStudents += parseInt(course.enrolled_students) || 0;
                    }
                }
                
                totalTeachers = teacherSet.size;
                
                // Batch API calls with delays to avoid rate limiting
                // Process courses in batches of 5 with 200ms delay between batches
                const courseData = [];
                const batchSize = 5;
                
                for (let i = 0; i < courses.length; i += batchSize) {
                    const batch = courses.slice(i, i + batchSize);
                    const batchPromises = batch.map(async (course) => {
                        try {
                            const [assignments, grades] = await Promise.all([
                                apiCall(`/assignments/course/${course.id}`).catch(() => []),
                                apiCall(`/grades/course/${course.id}`).catch(() => [])
                            ]);
                            
                            const assignmentCount = assignments.length;
                            const gradeCount = grades.length;
                            let courseAvg = 0;
                            
                            if (grades.length > 0) {
                                courseAvg = grades.reduce((sum, g) => sum + parseFloat(g.percentage || 0), 0) / grades.length;
                            }
                            
                            return {
                                course,
                                assignments: assignmentCount,
                                grades: gradeCount,
                                average: courseAvg
                            };
                        } catch (e) {
                            return {
                                course,
                                assignments: 0,
                                grades: 0,
                                average: 0
                            };
                        }
                    });
                    
                    const batchResults = await Promise.all(batchPromises);
                    courseData.push(...batchResults);
                    
                    // Add delay between batches (except for last batch)
                    if (i + batchSize < courses.length) {
                        await new Promise(resolve => setTimeout(resolve, 200));
                    }
                }
                
                // Calculate totals from batched data
                courseData.forEach(data => {
                    totalAssignments += data.assignments;
                    totalGrades += data.grades;
                    if (data.average > 0) {
                        averageGrade += data.average;
                    }
                });
                
                if (courses.length > 0) {
                    averageGrade = averageGrade / courses.length;
                }
                
                content.innerHTML = `

        // Filter learning areas based on search query
        function filterLearningAreas(searchQuery) {
            const query = searchQuery.toLowerCase().trim();
            const cards = document.querySelectorAll('.learning-area-card');
            const resultsCount = document.getElementById('search-results-count');
            const filteredCountSpan = document.getElementById('filtered-count');
            const clearBtn = document.getElementById('clear-search-btn');
            
            let visibleCount = 0;
            
            cards.forEach(card => {
                const courseName = card.getAttribute('data-course-name') || '';
                const courseCode = card.getAttribute('data-course-code') || '';
                const courseDescription = card.getAttribute('data-course-description') || '';
                
                const matches = courseName.includes(query) || 
                               courseCode.includes(query) || 
                               courseDescription.includes(query);
                
                if (matches || query === '') {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Update results count
            if (resultsCount && filteredCountSpan) {
                filteredCountSpan.textContent = visibleCount;
                if (query.length > 0) {
                    resultsCount.style.display = 'block';
                } else {
                    resultsCount.style.display = 'none';
                }
            }
            
            // Show/hide clear button
            if (clearBtn) {
                clearBtn.style.display = query.length > 0 ? 'flex' : 'none';
            }
        }

        async function saveSubstrand(e, courseId, learningAreaId) {
            e.preventDefault();
            
            const form = e.target;
            const strandCode = form.strand_code.value;
            const subStrandCode = form.sub_strand_code.value;
            const subStrandName = form.sub_strand_name.value;
            
            // Collect indicators
            const indicators = [];
            document.querySelectorAll('.indicator-item-input').forEach(item => {
                const code = item.querySelector('.indicator-code-input').value;
                const name = item.querySelector('.indicator-name-input').value;
                if (code && name) {
                    indicators.push({
                        indicator_code: code,
                        indicator_name: name
                    });
                }
            });
            
            // Collect rubrics
            const rubrics = [];
            for (let level = 1; level <= 4; level++) {
                const name = form[`rubric_level_${level}_name`].value;
                const description = form[`rubric_level_${level}_description`].value;
                const score = parseFloat(form[`rubric_level_${level}_score`].value) || (level * 25);
                
                if (name || description) {
                    rubrics.push({
                        level: level,
                        name: name || `Level ${level}`,
                        description: description,
                        score: score
                    });
                }
            }
            
            try {
                await apiCall(`/substrands/learning-area/${learningAreaId}/strand/${strandCode}/substrand`, {
                    method: 'POST',
                    body: JSON.stringify({
                        sub_strand_code: subStrandCode,
                        sub_strand_name: subStrandName,
                        indicators: indicators,
                        rubrics: rubrics
                    })
                });
                
                alert('Sub-strand created successfully!');
                closeSubstrandModal();
                
                // Reload view - either course view or learning area management
                if (courseId && courseId > 0 && window.currentCourseViewData && window.currentCourseViewData.courseId) {
                    // Reload course view to show updated curriculum
                    await viewCourseDetails(window.currentCourseViewData.courseId);
                } else {
                    // Reload learning area substrands management view
                    const learningAreaName = document.querySelector('.view-header h2')?.textContent?.split(' - ')[0] || 'Learning Area';
                    await viewLearningAreaSubstrands(learningAreaId, learningAreaName);
                }
            } catch (error) {
                console.error('Error creating sub-strand:', error);
                alert('Error creating sub-strand: ' + (error.message || 'Server error'));
            }
        }

        // Subject search functions (global scope)
        function filterSubjects(searchTerm) {
            const resultsDiv = document.getElementById('subject-results');
            if (!resultsDiv || !window.allCourses) return;
            
            if (!searchTerm || searchTerm.length < 1) {
                resultsDiv.style.display = 'none';
                return;
            }
            
            const searchLower = searchTerm.toLowerCase();
            const filtered = window.allCourses.filter(c => {
                const name = (c.course_name || '').toLowerCase();
                const code = (c.course_code || '').toLowerCase();
                return name.includes(searchLower) || code.includes(searchLower);
            });
            
            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="subject-result-item" style="padding: 1rem; color: #666;">No subjects found</div>';
            } else {
                resultsDiv.innerHTML = filtered.slice(0, 10).map(c => {
                    const safeName = (c.course_name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeCode = (c.course_code || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    return '<div class="subject-result-item" onclick="selectSubject(' + c.id + ', \'' + safeName + '\', \'' + safeCode + '\')">' +
                        '<strong>' + (c.course_name || '') + '</strong>' +
                        '<span style="color: #666; font-size: 0.875rem;"> (' + (c.course_code || '') + ')</span>' +
                        '</div>';
                }).join('');
            }
            
            resultsDiv.style.display = 'block';
        }

        async function showCreateTermForm() {
            document.getElementById('term-form-title').textContent = 'Create New Term';
            document.getElementById('term-form').reset();
            document.getElementById('term-id').value = '';
            document.getElementById('academic-year').value = `${new Date().getFullYear()}-${new Date().getFullYear() + 1}`;
            document.getElementById('migrate-structure-group').style.display = 'block';
            document.getElementById('migrate-structure').checked = false;
            document.getElementById('migrate-options').style.display = 'none';
            
            // Load previous terms for migration dropdown
            try {
                const terms = await apiCall('/terms');
                const sourceTermSelect = document.getElementById('source-term-id');
                sourceTermSelect.innerHTML = '<option value="">-- Select a previous term --</option>';
                
                // Filter and sort terms (most recent first)
                const sortedTerms = terms
                    .filter(t => t.is_active !== false)
                    .sort((a, b) => {
                        if (a.academic_year !== b.academic_year) {
                            return b.academic_year.localeCompare(a.academic_year);
                        }
                        return b.term_number - a.term_number;
                    });
                
                sortedTerms.forEach(term => {
                    const option = document.createElement('option');
                    option.value = term.id;
                    option.textContent = `${term.name} (${term.academic_year})`;
                    sourceTermSelect.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading terms for migration:', error);
            }
            
            const modal = document.getElementById('term-form-modal');
            modal.style.display = 'flex';
            // Smooth animation
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }
        
        function toggleMigrateOptions() {
            const checkbox = document.getElementById('migrate-structure');
            const options = document.getElementById('migrate-options');
            const sourceTermSelect = document.getElementById('source-term-id');
            
            if (checkbox.checked) {
                options.style.display = 'block';
                sourceTermSelect.required = true;
            } else {
                options.style.display = 'none';
                sourceTermSelect.required = false;
                sourceTermSelect.value = '';
            }
        }

        async function editTerm(termId) {
            try {
                const term = await apiCall(`/terms/${termId}`);
                document.getElementById('term-form-title').textContent = 'Edit Term';
                document.getElementById('term-id').value = term.id;
                document.getElementById('term-number').value = term.term_number;

            }
        }

        async function saveTerm(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            const termId = data.id;
            
            try {
                if (termId) {
                    // Update existing term
                    await apiCall(`/terms/${termId}`, {
                        method: 'PUT',
                        body: JSON.stringify({
                            name: data.name,
                            date_range_start: data.date_range_start,
                            date_range_end: data.date_range_end,
                            start_date: data.start_date || null,
                            end_date: data.end_date || null
                        })
                    });
                    showToast('Term updated successfully!', 'success');
                } else {
                    // Create new term
                    const termData = {
                        term_number: parseInt(data.term_number),
                        academic_year: data.academic_year,
                        name: data.name,
                        date_range_start: data.date_range_start,
                        date_range_end: data.date_range_end,
                        start_date: data.start_date || null,
                        end_date: data.end_date || null
                    };
                    
                    const newTerm = await apiCall('/terms', {
                        method: 'POST',
                        body: JSON.stringify(termData)
                    });
                    
                    // If migration is requested, migrate structure
                    if (data.migrate_structure === 'on' && data.source_term_id) {
                        try {
                            showToast('Migrating structure from previous term...', 'info');
                            await apiCall(`/terms/${newTerm.id}/migrate-structure`, {
                                method: 'POST',
                                body: JSON.stringify({
                                    source_term_id: parseInt(data.source_term_id)
                                })
                            });
                            showToast('Term created and structure migrated successfully!', 'success');
                        } catch (migrateError) {
                            console.error('Migration error:', migrateError);
                            showToast('Term created, but migration failed: ' + migrateError.message, 'error');
                        }
                    } else {
                        showToast('Term created successfully!', 'success');
                    }
                }
                closeTermModal();
                loadManageTerms();
            } catch (error) {
                alert('Error saving term: ' + error.message);
            }
        }

        async function deactivateTerm(termId) {
            if (!confirm('Are you sure you want to close this term?')) return;
            
            try {
                await apiCall(`/terms/${termId}`, { method: 'DELETE' });
                showToast('Term closed successfully!', 'success');
                loadManageTerms();
            } catch (error) {
                showToast('Error closing term: ' + error.message, 'error');
            }
        }

        async function activateTerm(termId) {
            try {
                await apiCall(`/terms/${termId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ is_active: true })
                });
                showToast('Term activated successfully!', 'success');
                loadManageTerms();
            } catch (error) {
                showToast('Error activating term: ' + error.message, 'error');
            }
        }

        // Toast notification function
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon">
                    ${type === 'success' ? '✓' : '✕'}
                </div>
                <div class="toast-message">${message}</div>
            `;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        function closeTermModal() {
            const modal = document.getElementById('term-form-modal');
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 220);
        }
